<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        input, select, textarea { background-color: #FFFFFF; border: 1px solid #E2E8F0 !important; transition: all 0.15s ease; }
        input:focus, select:focus, textarea:focus { border-color: #1E3A8A !important; box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.05); outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .live-edit-input { border: 1px dashed #3B82F6 !important; background-color: #FFF !important; padding: 4px 8px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 6px; color: #1E3A8A; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen flex justify-center items-start">

    <div id="appContainer" class="w-full max-w-7xl flex flex-col gap-6 md:gap-8">
        
        <div class="bg-[#1E3A8A] p-6 md:p-8 rounded-xl shadow-md text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="w-12 h-0.5 bg-sky-400 mb-2"></div>
                <h3 class="text-xl font-bold tracking-wider">N5-N2自查文法库</h3>
                <p class="text-xs text-slate-300 mt-1">云同步升级版：利用 GitHub 充当免费云存储，手机电脑数据实时跨端完美同步！</p>
            </div>
            <div class="flex gap-8 border-t md:border-t-0 pt-4 md:pt-0 border-blue-900/50 w-full md:w-auto font-serif">
                <div class="text-center md:text-left">
                    <span class="block text-[10px] font-black text-rose-300 tracking-wider mb-1 uppercase" id="dueTitle">🚨 今日截止需复习</span>
                    <span class="text-4xl font-black tracking-tighter text-rose-400" id="dueCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
                <div class="text-center md:text-left border-l border-blue-900/60 pl-8">
                    <span class="block text-[10px] font-black text-sky-300 tracking-wider mb-1 uppercase">📦 语法库总储备</span>
                    <span class="text-4xl font-black tracking-tighter text-sky-200" id="totalCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
            </div>
        </div>

        <div id="cloudConfigPanel" class="bg-blue-50 border border-blue-200 p-4 rounded-xl grid grid-cols-1 md:grid-cols-4 gap-3 text-xs items-end">
            <div>
                <label class="block font-bold text-blue-900 mb-1">GitHub 用户名</label>
                <input type="text" id="ghUser" placeholder="输入你的GitHub用户名" class="w-full p-2 rounded border">
            </div>
            <div>
                <label class="block font-bold text-blue-900 mb-1">仓库名称</label>
                <input type="text" id="ghRepo" value="japanese-vocab-dog" class="w-full p-2 rounded border">
            </div>
            <div>
                <label class="block font-bold text-blue-900 mb-1">GitHub Token (钥匙)</label>
                <input type="password" id="ghToken" placeholder="贴入 ghp_ 开头的Token" class="w-full p-2 rounded border">
            </div>
            <div class="flex gap-2">
                <button onclick="saveCloudConfig()" class="flex-1 py-2 bg-blue-800 text-white font-bold rounded hover:bg-blue-900 cursor-pointer text-center">
                    💾 绑定并云同步
                </button>
                <button onclick="fetchFromCloud()" class="py-2 px-3 bg-emerald-600 text-white font-bold rounded hover:bg-emerald-700 cursor-pointer" title="手动从云端拉取最新数据">
                    🔄 拉取
                </button>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
            <div class="lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase block border-b border-slate-100 pb-2">01 / SMART INPUT FLOW (自由无感录入)</span>
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-1.5">
                        <label class="block text-[11px] font-black text-[#1E3A8A]">✨ 自由乱序输入/粘贴框</label>
                        <textarea id="vSmartPaste" rows="4" oninput="handleSmartSplit()" placeholder="直接把听抄的整段文本糊在这里，下方全自动进行分流特征识别..." class="w-full p-2.5 bg-white rounded-lg text-xs font-medium border-dashed text-slate-700"></textarea>
                    </div>
                    <div class="w-full border-t border-slate-100 my-2"></div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">日文语法点/词汇</label>
                            <input type="text" id="vWord" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">级别</label>
                            <select id="vLevel" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-700">
                                <option value="N2">N2 核心</option><option value="N3" selected>N3 核心</option><option value="N4">N4 基础</option><option value="N5">N5 基础</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">日文汉字标记</label>
                        <input type="text" id="vFurigana" class="w-full p-2.5 rounded-lg text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文翻译</label>
                        <input type="text" id="vTranslation" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文语法功能解释</label>
                        <input type="text" id="vMeaning" class="w-full p-2.5 rounded-lg text-xs text-slate-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">接续规则 (支持自动多行换行)</label>
                        <textarea id="vConnection" rows="3" class="w-full p-2.5 rounded-lg text-xs text-slate-600 leading-relaxed"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">听抄日文例句/场景备注</label>
                        <textarea id="vMemo" rows="2" class="w-full p-2.5 rounded-lg text-xs"></textarea>
                    </div>
                    <button onclick="saveNewVocab()" class="w-full text-xs font-black tracking-widest py-3 bg-[#1E3A8A] hover:bg-blue-900 text-white rounded-lg transition cursor-pointer shadow-sm">
                        📥 安全存入并同步至云端
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col min-h-[480px] md:min-h-[540px] order-1 lg:order-2">
                <div class="border-b border-slate-100 pb-3 mb-6 flex justify-between items-center">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase" id="cockpitTitle">02 / MEMORY COCKPIT (智能自查舱)</span>
                    <div class="flex items-center gap-4">
                        <button onclick="deleteCurrentCard()" id="deleteBtn" class="text-[10px] font-bold text-slate-300 hover:text-red-600 transition cursor-pointer hidden">
                            🗑️ 删除此条
                        </button>
                        <span class="text-[10px] font-mono text-gray-400" id="cardIndexText">0 / 0</span>
                    </div>
                </div>

                <div id="cardCockpit" class="flex-1 flex flex-col justify-between space-y-8">
                    <div id="emptyState" class="text-center py-16 flex flex-col items-center justify-center space-y-4 hidden">
                        <span class="text-xs italic text-slate-400">🎉 太棒了！当前自查语法点已通关清零！</span>
                        <button onclick="startInfiniteReviewMode()" class="px-6 py-3 bg-[#1E3A8A] text-white hover:bg-blue-900 font-bold text-xs rounded-xl shadow-md transition cursor-pointer flex items-center gap-2">
                            🔄 开启无限自由复习 / 再次学习
                        </button>
                    </div>

                    <div id="activeCard" class="space-y-6 flex-1 flex flex-col justify-between hidden">
                        <div class="space-y-2 flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <span id="cardLevel" class="inline-block text-[9px] font-black px-1.5 py-0.5 bg-blue-50 text-[#1E3A8A] rounded">N3</span>
                                <h1 id="cardWord" class="text-3xl md:text-4xl font-black font-serif tracking-wide text-slate-900 pt-2 break-words">加载中...</h1>
                            </div>
                            <button onclick="speakJapanese()" class="p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-sm font-bold text-slate-700 cursor-pointer transition shadow-sm flex items-center gap-1.5 shrink-0">
                                🔊 朗读原音
                            </button>
                        </div>

                        <div id="hiddenZone" class="bg-slate-50 border border-slate-100 p-4 md:p-5 rounded-xl space-y-3 opacity-100 transition-opacity">
                            <div class="blur-md pointer-events-none select-none transition-all duration-300" id="blurWrapper">
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center" onclick="makeEditable('furigana')">
                                    汉字标记：<span id="cardFuriganaContainer" class="inline-block ml-1 flex-1 font-serif text-sm text-slate-800 font-bold"><span id="cardFurigana"></span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('translation')">
                                    中文翻译：<span id="cardTranslationContainer" class="inline-block ml-1 flex-1 text-base text-blue-900 font-bold"><span id="cardTranslation"></span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('meaning')">
                                    功能解释：<span id="cardMeaningContainer" class="inline-block ml-1 flex-1 text-xs text-slate-600"><span id="cardMeaning"></span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-1 block" onclick="makeEditable('connection')">
                                    接续规则：
                                    <div id="cardConnectionContainer" class="text-slate-700 text-xs font-mono bg-white/60 p-2 rounded border border-slate-200/50 mt-1 leading-relaxed whitespace-pre-wrap"><span id="cardConnection"></span></div>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-2 border-t border-slate-200/60 pt-2" onclick="makeEditable('memo')">
                                    听抄例句：
                                    <div id="cardMemoContainer" class="text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap"><span id="cardMemo"></span></div>
                                </div>
                            </div>
                            <div id="triggerBtnBox" class="text-center py-4">
                                <button onclick="revealCard()" id="revealBtn" class="w-full md:w-auto px-6 py-2.5 bg-slate-800 text-white font-bold text-xs rounded-full hover:bg-black transition cursor-pointer shadow-sm">
                                    👁️ 脑补完毕，查看隐藏答案
                                </button>
                            </div>
                        </div>

                        <div id="decisionBox" class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 hidden">
                            <button onclick="handleDecision(false)" class="py-3 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold border border-rose-200 text-center">
                                ❌ 没想起来
                            </button>
                            <button onclick="handleDecision(true)" class="py-3 bg-blue-800 text-white rounded-lg text-xs font-bold text-center shadow-sm">
                                ✅ 顺利通过
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mt-2">
            <div class="bg-slate-100 px-5 py-4 flex justify-between items-center border-b border-slate-200 cursor-pointer" onclick="toggleDatabasePanel()">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-[#1E3A8A] uppercase tracking-wider">📚 WHOLE GRAMMAR DATABASE (整体文法全量题库)</span>
                    <span class="text-[10px] bg-blue-100 text-[#1E3A8A] font-bold px-2 py-0.5 rounded-full" id="dbTotalBadge">0 条</span>
                </div>
                <span id="foldArrow" class="text-xs font-bold text-slate-400">展开 ➕</span>
            </div>
            <div id="databasePanelBody" class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden max-h-[600px] overflow-y-auto no-scrollbar bg-slate-50/50">
            </div>
        </div>

    </div>

    <script>
        const EBBINGHAUS_INTERVALS = [0, 1, 24, 72, 168, 360];
        let localVocabDB = []; let dueCardsPool = []; let currentIndex = 0; let isRevealedStatus = false;
        let isInfiniteReviewMode = false;
        let cloudSha = null; // 存储云端文件的唯一变动标识

        window.onload = function() {
            loadCloudConfigFromLocal();
            initVocabEngine();
        };

        // 从本地加载已经填过的云配置
        function loadCloudConfigFromLocal() {
            document.getElementById('ghUser').value = localStorage.getItem('MZ_GH_USER') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('MZ_GH_REPO') || 'japanese-vocab-dog';
            document.getElementById('ghToken').value = localStorage.getItem('MZ_GH_TOKEN') || '';
        }

        // 保存云配置并立刻拉取
        function saveCloudConfig() {
            localStorage.setItem('MZ_GH_USER', document.getElementById('ghUser').value.trim());
            localStorage.setItem('MZ_GH_REPO', document.getElementById('ghRepo').value.trim());
            localStorage.setItem('MZ_GH_TOKEN', document.getElementById('ghToken').value.trim());
            alert("⚙️ 云同步配置保存成功！正在尝试连接 GitHub 云端数据库...");
            fetchFromCloud();
        }

        // 🔄 核心：直接向你自己的 GitHub 仓库拉取最新数据文件
        async function fetchFromCloud() {
            const user = localStorage.getItem('MZ_GH_USER');
            const repo = localStorage.getItem('MZ_GH_REPO');
            const token = localStorage.getItem('MZ_GH_TOKEN');
            if(!user || !token) return;

            const url = `https://api.github.com/repos/${user}/${repo}/contents/database.json`;
            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if(res.status === 200) {
                    const json = await res.json();
                    cloudSha = json.sha; // 拿到最新标识
                    const decodedData = decodeURIComponent(escape(atob(json.content))); // 解密Base64
                    localVocabDB = JSON.parse(decodedData);
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', decodedData); // 写入缓存
                    refreshEngineState();
                    console.log("☁️ 成功从 GitHub 云端拉取同步最新题库！");
                } else if(res.status === 404) {
                    console.log("☁️ 云端尚无数据文件，将以本地数据为准。");
                    pushToCloud(); // 逆向创建
                }
            } catch(e) { alert("云端拉取失败，请检查网络或Token权限。"); }
        }

        // 📤 核心：数据变动时，静默全自动同步推送到 GitHub 云端保存
        async function pushToCloud() {
            const user = localStorage.getItem('MZ_GH_USER');
            const repo = localStorage.getItem('MZ_GH_REPO');
            const token = localStorage.getItem('MZ_GH_TOKEN');
            if(!user || !token) return;

            const url = `https://api.github.com/repos/${user}/${repo}/contents/database.json`;
            const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(localVocabDB)))); // 转换Base64防止中文乱码

            const body = {
                message: "🗃️ Sync Japanese Grammar Database via MZ.Edu App",
                content: contentBase64
            };
            if(cloudSha) body.sha = cloudSha; // 覆盖更新时必须带上 sha

            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if(res.status === 200 || res.status === 201) {
                    const json = await res.json();
                    cloudSha = json.content.sha; // 更新本地最新标记
                    console.log("☁️ 数据已成功云同步至 GitHub 仓库！");
                }
            } catch(e) { console.error("同步到云端失败", e); }
        }

        function initVocabEngine() {
            let data = localStorage.getItem('MZ_JAP_GRAMMAR_DB') || localStorage.getItem('MZ_JAP_VOCAB_DB');
            localVocabDB = data ? JSON.parse(data) : [];
            refreshEngineState();
            fetchFromCloud(); // 异步静默拉取云端对齐
        }

        function handleSmartSplit() {
            const rawText = document.getElementById('vSmartPaste').value;
            if (!rawText.trim()) return;
            let chunks = rawText.split('\n').map(c => c.trim()).filter(c => c.length > 0);
            if (chunks.length <= 1) chunks = rawText.split(/[\uff0c,；;／\/|\t]/).map(c => c.trim()).filter(c => c.length > 0);
            if (chunks.length === 0) return;

            let dWord = "", dFurigana = "", dTranslation = "", dMeaning = "", dConnection = [], dMemo = "";
            const hasJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/;
            const hasChinese = /[\u4e00-\u9fa5]/;

            chunks.forEach((chunk) => {
                if (hasJapanese.test(chunk) && (chunk.includes('。') || chunk.includes('、') || chunk.length > 15) && !hasChinese.test(chunk)) { dMemo = chunk; return; }
                if (hasJapanese.test(chunk) && chunk.length <= 12 && !hasChinese.test(chunk)) {
                    if (!dWord) { dWord = chunk; return; }
                    if (dWord && !dFurigana) { dFurigana = chunk; return; }
                }
                if (hasChinese.test(chunk) && chunk.length <= 10 && !chunk.includes('+') && !chunk.includes('＋')) { dTranslation = chunk; return; }
                if (chunk.includes('+') || chunk.includes('＋') || chunk.includes('名') || chunk.includes('形') || chunk.includes('简体') || chunk.includes('词干')) { dConnection.push(chunk); return; }
                if (hasChinese.test(chunk) && chunk.length > 10) { dMeaning = chunk; return; }
            });

            if (chunks.length >= 5 && (!dWord || !dTranslation || dConnection.length === 0 || !dMemo)) {
                dWord = chunks[0]; dFurigana = chunks[1]; dTranslation = chunks[2]; dMeaning = chunks[3];
                let connList = []; for(let i = 4; i < chunks.length - 1; i++) connList.push(chunks[i]);
                dConnection = connList; dMemo = chunks[chunks.length - 1];
            }

            if (dWord) document.getElementById('vWord').value = dWord;
            document.getElementById('vFurigana').value = dFurigana;
            if (dTranslation) document.getElementById('vTranslation').value = dTranslation;
            document.getElementById('vMeaning').value = dMeaning;
            document.getElementById('vConnection').value = dConnection.join('\n');
            if (dMemo) document.getElementById('vMemo').value = dMemo;
        }

        function speakJapanese(customText) {
            if (!('speechSynthesis' in window)) return;
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            let textToSpeak = customText || document.getElementById('cardWord').innerText;
            if(!customText && isRevealedStatus) {
                const m = document.getElementById('cardMemo').innerText;
                if(m && m !== '暂无详细笔记。') textToSpeak += "。 " + m;
            }
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang.includes('ja') && (v.name.includes('Natural') || v.name.includes('Online')));
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.rate = 0.82;
            window.speechSynthesis.speak(utterance);
        }

        function refreshEngineState() {
            const now = Date.now();
            if (!isInfiniteReviewMode) {
                document.getElementById('dueTitle').innerText = "🚨 今日截止需复习";
                dueCardsPool = [];
                localVocabDB.forEach(item => {
                    const hoursPassed = (now - item.lastTime) / (1000 * 60 * 60);
                    if ((item.stage || 0) < EBBINGHAUS_INTERVALS.length) {
                        if (hoursPassed >= EBBINGHAUS_INTERVALS[item.stage || 0]) dueCardsPool.push(item);
                    }
                });
                document.getElementById('dueCount').innerText = dueCardsPool.length;
            }
            document.getElementById('totalCount').innerText = localVocabDB.length;
            document.getElementById('dbTotalBadge').innerText = `${localVocabDB.length} 条`;
            renderActiveCard();
            renderWholeDatabaseList(); 
        }

        function startInfiniteReviewMode() {
            isInfiniteReviewMode = true;
            dueCardsPool = [...localVocabDB].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            document.getElementById('dueTitle').innerText = "🔄 自由刷题再练模式中";
            refreshEngineState();
        }

        function renderActiveCard() {
            const emptyState = document.getElementById('emptyState');
            const activeCard = document.getElementById('activeCard');
            const deleteBtn = document.getElementById('deleteBtn');
            if (dueCardsPool.length === 0) {
                emptyState.classList.remove('hidden'); activeCard.classList.add('hidden'); deleteBtn.classList.add('hidden');
                document.getElementById('cardIndexText').innerText = "0 / 0"; return;
            }
            emptyState.classList.add('hidden'); activeCard.classList.remove('hidden'); deleteBtn.classList.remove('hidden');
            document.getElementById('cardIndexText').innerText = `${currentIndex + 1} / ${dueCardsPool.length}`;

            const card = dueCardsPool[currentIndex];
            document.getElementById('cardLevel').innerText = card.level;
            document.getElementById('cardWord').innerText = card.word;
            isRevealedStatus = false;
            
            resetDOM('cardFuriganaContainer', card.furigana || '无', 'text-slate-800 text-sm font-bold font-serif');
            resetDOM('cardTranslationContainer', card.translation || '未填写中文翻译', 'text-[#1E3A8A] text-base font-bold');
            resetDOM('cardMeaningContainer', card.meaning || '暂无详细功能解释。', 'text-slate-500 text-xs');
            resetDOM('cardConnectionContainer', card.connection || '暂无接续规则配置。', 'text-slate-700 text-xs font-mono whitespace-pre-wrap');
            resetDOM('cardMemoContainer', card.memo || '暂无详细笔记。', 'text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap');

            document.getElementById('blurWrapper').className = "blur-md pointer-events-none select-none transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.remove('hidden');
            document.getElementById('decisionBox').classList.add('hidden');
        }

        function resetDOM(id, text, cls) {
            const el = document.getElementById(id);
            if(el) el.innerHTML = `<span class="${cls}">${text}</span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span>`;
        }

        function revealCard() {
            document.getElementById('blurWrapper').className = "transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.add('hidden');
            document.getElementById('decisionBox').className = "grid grid-cols-2 gap-4 pt-4 border-t border-slate-100";
            isRevealedStatus = true;
        }

        function makeEditable(key) {
            if (!isRevealedStatus) return;
            const card = dueCardsPool[currentIndex];
            let id = key === 'furigana' ? 'cardFuriganaContainer' : (key === 'translation' ? 'cardTranslationContainer' : (key === 'meaning' ? 'cardMeaningContainer' : (key === 'connection' ? 'cardConnectionContainer' : 'cardMemoContainer')));
            const container = document.getElementById(id);
            if (container.querySelector('input') || container.querySelector('textarea')) return;

            let val = card[key] || "";
            let el = (key === 'memo' || key === 'connection') ? `<textarea class="live-edit-input text-xs" rows="3">${val}</textarea>` : `<input type="text" class="live-edit-input" value="${val}" />`;
            container.innerHTML = el;
            const input = container.children[0]; input.focus();

            input.onblur = function() {
                const newText = input.value.trim();
                const matched = localVocabDB.find(i => i.id === card.id);
                if (matched) {
                    matched[key] = newText;
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                    pushToCloud(); // 💡 原地修改，失焦自动秒级同步至 GitHub 云端
                }
                refreshEngineState();
            };
        }

        function handleDecision(yes) {
            const card = dueCardsPool[currentIndex];
            const matched = localVocabDB.find(i => i.id === card.id);
            if (matched) {
                if (!isInfiniteReviewMode) {
                    matched.stage = yes ? (matched.stage || 0) + 1 : 1;
                    matched.lastTime = Date.now();
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                    pushToCloud(); // 💡 刷题表态判定，自动推送到 GitHub 云端
                }
                currentIndex++; refreshEngineState();
            }
        }

        function deleteCurrentCard() {
            const card = dueCardsPool[currentIndex];
            if (confirm(`⚠️ 确定彻底删除【${card.word}】吗？`)) {
                localVocabDB = localVocabDB.filter(item => item.id !== card.id);
                localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                pushToCloud(); // 💡 删除联动同步云端
                if (currentIndex > 0) currentIndex--; refreshEngineState();
            }
        }

        function renderWholeDatabaseList() {
            const container = document.getElementById('databasePanelBody'); container.innerHTML = "";
            if (localVocabDB.length === 0) return;
            localVocabDB.forEach((item) => {
                const cardEl = document.createElement('div');
                cardEl.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex flex-col justify-between space-y-3 relative hover:border-[#1E3A8A] transition-all";
                let jaAudioText = (item.word + (item.memo && item.memo !== '暂无详细笔记。' ? '。' + item.memo : '')).replace(/[\r\n]/g, " ").replace(/'/g, "\\'");
                cardEl.innerHTML = `
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center"><span class="text-[9px] font-black px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded">${item.level}</span><div class="flex gap-2"><button onclick="speakJapanese('${jaAudioText}')" class="text-xs cursor-pointer">🔊</button><button onclick="forceFocusCard('${item.id}')" class="text-xs text-slate-300 hover:text-[#1E3A8A] cursor-pointer">➔</button></div></div>
                        <h4 class="font-serif font-bold text-slate-900 text-lg">${item.word}</h4>
                        <div class="text-[11px] text-slate-400 font-serif">汉字：<span class="text-slate-700 font-bold">${item.furigana || '无'}</span></div>
                        <div class="text-xs text-blue-900 font-bold">翻译：<span>${item.translation || '未填写'}</span></div>
                        <div class="text-[11px] text-slate-500">解释：<span>${item.meaning || '无'}</span></div>
                        <div class="text-[11px] text-slate-500 font-mono bg-slate-50 p-1.5 rounded border border-slate-100 whitespace-pre-wrap">接续：${item.connection || '无'}</div>
                        <div class="text-[11px] text-slate-600 italic bg-blue-50/40 p-1.5 rounded border border-blue-50/50 whitespace-pre-wrap">例句：${item.memo || '无'}</div>
                    </div>`;
                container.appendChild(cardEl);
            });
        }

        function forceFocusCard(id) {
            const matched = localVocabDB.find(i => i.id === id);
            if (matched) { isInfiniteReviewMode = true; dueCardsPool = [matched]; currentIndex = 0; refreshEngineState(); window.scrollTo({ top: 100, behavior: 'smooth' }); }
        }

        function toggleDatabasePanel() {
            const body = document.getElementById('databasePanelBody'); const arrow = document.getElementById('foldArrow');
            if (body.classList.contains('hidden')) { body.classList.remove('hidden'); arrow.innerText = "折叠 ➖"; } 
            else { body.classList.add('hidden'); arrow.innerText = "展开 ➕"; }
        }

        function saveNewVocab() {
            const word = document.getElementById('vWord').value.trim();
            const level = document.getElementById('vLevel').value;
            const furigana = document.getElementById('vFurigana').value.trim();
            const translation = document.getElementById('vTranslation').value.trim();
            const meaning = document.getElementById('vMeaning').value.trim();
            const connection = document.getElementById('vConnection').value.trim();
            const memo = document.getElementById('vMemo').value.trim();
            if (!word || !translation) return alert("请检查，日语语法点与中文翻译项为必填核心项。");

            localVocabDB.push({ id: 'g_' + Date.now(), word, level, furigana, translation, meaning, connection, memo, stage: 0, lastTime: Date.now() });
            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
            pushToCloud(); // 💡 录入新词，全自动推送到 GitHub 云端存储

            ['vWord','vFurigana','vTranslation','vMeaning','vConnection','vMemo','vSmartPaste'].forEach(id => document.getElementById(id).value = '');
            refreshEngineState();
        }

        function exportBackupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(localVocabDB));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `文法备份_${Date.now()}.json`); dl.click();
        }

        function importBackupData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        localVocabDB = data; localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                        pushToCloud(); refreshEngineState();
                    }
                } catch(err) { alert("文件解析失败。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
