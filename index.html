<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #FBFBFA; color: #111111; }
        input, select, textarea { background-color: #FAFAFA; border: 1px solid #E5E5E3 !important; transition: all 0.15s ease; }
        input:focus, select:focus, textarea:focus { border-color: #111111 !important; background-color: #FFF; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 🔒 安全锁拦截遮罩 */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #FBFBFA; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #appContainer { display: none; }
        
        /* ✏️ 原地快捷修改输入框样式 */
        .live-edit-input { border: 1px dashed #10B981 !important; background-color: #FFF !important; padding: 2px 6px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 4px; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex justify-center items-start">

    <div id="authOverlay">
        <div class="w-full max-w-sm p-8 bg-white rounded-xl border border-[#E5E5E3] shadow-lg text-center space-y-5">
            <div class="flex flex-col items-center">
                <div class="w-8 h-0.5 bg-[#111] mb-3"></div>
                <h3 class="text-sm font-black tracking-widest uppercase text-gray-800">NIHONGO LOCK / 授权访问</h3>
                <p class="text-[11px] text-gray-400 mt-1">请输入授权密码进入 N5-N2自查文法库</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="passInput" placeholder="输入授权密码" class="w-full p-3 rounded-lg text-xs text-center font-bold tracking-widest" onkeydown="if(event.keyCode==13) verifyPassword()">
                <button onclick="verifyPassword()" class="w-full bg-[#111111] text-white p-2.5 rounded-lg text-xs font-bold tracking-wider cursor-pointer hover:bg-[#333] transition">
                    进入系统
                </button>
            </div>
            <p id="errorHint" class="text-[10px] text-red-600 font-bold opacity-0 transition-opacity">❌ 授权密码错误</p>
        </div>
    </div>

    <div id="appContainer" class="w-full max-w-7xl flex flex-col gap-8">
        
        <div class="bg-white p-6 md:p-8 rounded-xl border border-[#E5E5E3] shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="w-12 h-0.5 bg-[#111] mb-2"></div>
                <h3 class="text-lg font-bold text-[#111] tracking-wider">N5-N2自查文法库</h3>
                <p class="text-[11px] text-[#A0A09C] mt-1">自动周期机制：支持在刷题舱原地修改语法解释与听抄例句，带原生高质量日语发音朗读。</p>
            </div>
            <div class="flex gap-8 border-t md:border-t-0 pt-4 md:pt-0 border-[#EEE] w-full md:w-auto font-serif">
                <div class="text-center md:text-left">
                    <span class="block text-[10px] font-bold text-red-500 tracking-wider mb-1 uppercase">🚨 今日截止需复习</span>
                    <span class="text-4xl font-black tracking-tighter text-red-600" id="dueCount">0</span><span class="text-xs font-bold ml-1 text-gray-400">条</span>
                </div>
                <div class="text-center md:text-left border-l border-gray-200 pl-8">
                    <span class="block text-[10px] font-bold text-gray-400 tracking-wider mb-1 uppercase">📦 语法库总储备</span>
                    <span class="text-4xl font-black tracking-tighter text-gray-800" id="totalCount">0</span><span class="text-xs font-bold ml-1 text-gray-400">条</span>
                </div>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white p-6 rounded-xl border border-[#E5E5E3] shadow-sm space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#111] uppercase block border-b border-[#EEE] pb-2">01 / INPUT NEW GRAMMAR (录入新语法)</span>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1">语法点/词汇</label>
                            <input type="text" id="vWord" placeholder="例: ～にともなって" class="w-full p-2 rounded text-xs font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1">级别</label>
                            <select id="vLevel" class="w-full p-2 rounded text-xs font-bold">
                                <option value="N2">N2 核心</option><option value="N3" selected>N3 核心</option><option value="N4">N4 基础</option><option value="N5">N5 基础</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">对应汉字/标记 (可不填)</label>
                        <input type="text" id="vFurigana" placeholder="例: ～に伴って" class="w-full p-2 rounded text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">中文语法解释</label>
                        <input type="text" id="vMeaning" placeholder="例: 随着...、伴随着..." class="w-full p-2 rounded text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1">听抄例句/接续/备注说明</label>
                        <textarea id="vMemo" rows="2" placeholder="输入接续规则或YouTube听抄到的场景例句..." class="w-full p-2 rounded text-xs"></textarea>
                    </div>
                    <button onclick="saveNewVocab()" class="w-full text-xs font-black tracking-widest py-2.5 bg-[#111] text-white rounded-lg hover:bg-[#333] transition cursor-pointer">
                        📥 安全存入自查文法库
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-[#E5E5E3] shadow-sm text-xs space-y-3">
                    <span class="text-xs font-black tracking-widest text-gray-400 uppercase block">数据迁移保护盾</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportBackupData()" class="p-2 border border-dashed rounded text-center font-bold hover:bg-gray-50 cursor-pointer">
                            📤 备份导出文法库
                        </button>
                        <label class="p-2 border border-dashed rounded text-center font-bold hover:bg-gray-50 cursor-pointer block">
                            📥 导入恢复文法库
                            <input type="file" id="importFile" class="hidden" onchange="importBackupData(this)">
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-6 rounded-xl border border-[#E5E5E3] shadow-sm flex flex-col min-h-[480px]">
                <div class="border-b border-[#EEEEEE] pb-3 mb-6 flex justify-between items-center">
                    <span class="text-xs font-black tracking-widest text-[#111] uppercase">02 / MEMORY COCKPIT (智能自查舱)</span>
                    <span class="text-[10px] font-mono text-gray-400" id="cardIndexText">0 / 0</span>
                </div>

                <div id="cardCockpit" class="flex-1 flex flex-col justify-between space-y-8">
                    <div id="emptyState" class="text-center py-20 italic text-gray-400 text-xs hidden">
                        🎉 太棒了！当前待自查复习的语法点已通关清零！
                    </div>

                    <div id="activeCard" class="space-y-6 flex-1 flex flex-col justify-between">
                        <div class="space-y-2 flex justify-between items-start">
                            <div>
                                <span id="cardLevel" class="inline-block text-[9px] font-black px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded">N3</span>
                                <h1 id="cardWord" class="text-4xl font-black font-serif tracking-wide text-gray-900 pt-2">にともなって</h1>
                            </div>
                            <button onclick="speakJapanese()" class="p-2.5 bg-gray-50 border border-gray-200 hover:bg-gray-100 rounded-lg text-lg cursor-pointer transition shadow-sm" title="朗读日语原音">
                                🔊 朗读原音
                            </button>
                        </div>

                        <div id="hiddenZone" class="bg-gray-50 border border-gray-100 p-5 rounded-xl space-y-3 opacity-100 transition-opacity">
                            <div class="blur-md pointer-events-none select-none transition-all duration-300" id="blurWrapper">
                                <div class="text-xs text-gray-400 editable-zone py-1 flex items-center" onclick="makeEditable('furigana')">
                                    汉字标记：<span id="cardFuriganaContainer" class="inline-block ml-1 flex-1 font-serif text-sm text-gray-880 font-bold"><span id="cardFurigana">伴って</span> <span class="edit-hint text-[10px] text-emerald-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-gray-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('meaning')">
                                    中文解释：<span id="cardMeaningContainer" class="inline-block ml-1 flex-1 text-base text-emerald-800 font-bold"><span id="cardMeaning">随着...</span> <span class="edit-hint text-[10px] text-emerald-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-gray-400 editable-zone py-1 mt-2 border-t border-gray-200/60 pt-2" onclick="makeEditable('memo')">
                                    听抄例句/接续：
                                    <div id="cardMemoContainer" class="text-gray-600 font-sans mt-1 italic text-xs leading-relaxed"><span id="cardMemo"></span> <span class="edit-hint text-[10px] text-emerald-600 pl-1">✏️</span></div>
                                </div>
                            </div>
                            <div id="triggerBtnBox" class="text-center py-4">
                                <button onclick="revealCard()" id="revealBtn" class="px-6 py-2 bg-gray-800 text-white font-bold text-xs rounded-full hover:bg-black transition cursor-pointer shadow-sm">
                                    👁️ 脑补完毕，查看隐藏答案
                                </button>
                            </div>
                        </div>

                        <div id="decisionBox" class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-100 hidden">
                            <button onclick="handleDecision(false)" class="py-3 bg-red-50 text-red-700 rounded-lg text-xs font-bold border border-red-200 hover:bg-red-100 transition cursor-pointer text-center">
                                ❌ 没想起来 (重置遗忘步长)
                            </button>
                            <button onclick="handleDecision(true)" class="py-3 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition cursor-pointer text-center shadow-sm">
                                ✅ 顺利通过 (晋级下阶段)
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "MZ666"; 

        function verifyPassword() {
            if(document.getElementById('passInput').value === CORRECT_PASSWORD) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                initVocabEngine(); 
            } else {
                document.getElementById('errorHint').style.opacity = '1';
                document.getElementById('passInput').value = '';
            }
        }

        const EBBINGHAUS_INTERVALS = [0, 1, 24, 72, 168, 360];
        let localVocabDB = []; let dueCardsPool = []; let currentIndex = 0; let isRevealedStatus = false;

        function initVocabEngine() {
            const data = localStorage.getItem('MZ_JAP_GRAMMAR_DB');
            localVocabDB = data ? JSON.parse(data) : [];
            refreshEngineState();
            if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
        }

        // 🔊 核心朗读合成算法
        function speakJapanese() {
            if (!('speechSynthesis' in window)) { alert("当前浏览器不支持TTS语音朗读。"); return; }
            if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); }

            const card = dueCardsPool[currentIndex];
            if (!card) return;

            // 智能抓取发音文本
            let textToSpeak = card.furigana && card.furigana !== '无' ? card.furigana : card.word;
            if (isRevealedStatus && card.memo && card.memo !== '暂无详细笔记。') {
                textToSpeak += "。 " + card.memo;
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';

            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang.includes('ja-JP') || v.lang.includes('ja_JP'));
            if (jaVoice) utterance.voice = jaVoice;

            utterance.rate = 0.85; // 稍微放慢语速方便跟读
            window.speechSynthesis.speak(utterance);
        }

        function refreshEngineState() {
            const now = Date.now();
            dueCardsPool = [];
            localVocabDB.forEach(item => {
                const hoursPassed = (now - item.lastTime) / (1000 * 60 * 60);
                const currentStage = item.stage || 0;
                if (currentStage < EBBINGHAUS_INTERVALS.length) {
                    const req = EBBINGHAUS_INTERVALS[currentStage];
                    if (hoursPassed >= req) dueCardsPool.push(item);
                }
            });
            document.getElementById('totalCount').innerText = localVocabDB.length;
            document.getElementById('dueCount').innerText = dueCardsPool.length;
            renderActiveCard();
        }

        function renderActiveCard() {
            const emptyState = document.getElementById('emptyState');
            const activeCard = document.getElementById('activeCard');
            const cardIndexText = document.getElementById('cardIndexText');

            if (dueCardsPool.length === 0) {
                emptyState.classList.remove('hidden');
                activeCard.classList.add('hidden');
                cardIndexText.innerText = "0 / 0";
                return;
            }

            emptyState.classList.add('hidden');
            activeCard.classList.remove('hidden');
            if (currentIndex >= dueCardsPool.length) currentIndex = 0;
            cardIndexText.innerText = `${currentIndex + 1} / ${dueCardsPool.length}`;

            const card = dueCardsPool[currentIndex];
            document.getElementById('cardLevel').innerText = card.level;
            document.getElementById('cardWord').innerText = card.word;
            isRevealedStatus = false;
            resetDOM('cardFuriganaContainer', card.furigana || '无', 'text-gray-800 text-sm font-bold font-serif');
            resetDOM('cardMeaningContainer', card.meaning, 'text-emerald-800 text-base font-bold');
            resetDOM('cardMemoContainer', card.memo || '暂无详细笔记。', 'text-gray-600 font-sans mt-1 italic text-xs leading-relaxed');

            document.getElementById('blurWrapper').className = "blur-md pointer-events-none select-none transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.remove('hidden');
            document.getElementById('decisionBox').classList.add('hidden');
        }

        function resetDOM(id, text, cls) {
            document.getElementById(id).innerHTML = `<span class="${cls}">${text}</span> <span class="edit-hint text-[10px] text-emerald-600 pl-1">✏️</span>`;
        }

        function revealCard() {
            document.getElementById('blurWrapper').className = "transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.add('hidden');
            document.getElementById('decisionBox').classList.remove('hidden');
            isRevealedStatus = true;
        }

        function makeEditable(key) {
            if (!isRevealedStatus) return;
            const card = dueCardsPool[currentIndex];
            let id = key === 'furigana' ? 'cardFuriganaContainer' : (key === 'meaning' ? 'cardMeaningContainer' : '
