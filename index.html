<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        input, select, textarea { background-color: #FFFFFF; border: 1px solid #E2E8F0 !important; transition: all 0.15s ease; }
        input:focus, select:focus, textarea:focus { border-color: #1E3A8A !important; box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.05); outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ✏️ 原地快捷修改输入框样式 */
        .live-edit-input { border: 1px dashed #3B82F6 !important; background-color: #FFF !important; padding: 4px 8px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 6px; color: #1E3A8A; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen flex justify-center items-start">

    <div id="appContainer" class="w-full max-w-7xl flex flex-col gap-6 md:gap-8">
        
        <div class="bg-[#1E3A8A] p-6 md:p-8 rounded-xl shadow-md text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="w-12 h-0.5 bg-sky-400 mb-2"></div>
                <h3 class="text-xl font-bold tracking-wider">N5-N2自查文法库</h3>
                <p class="text-xs text-slate-300 mt-1">自动周期机制：免密秒载，接续规则已全线扩容为自动折行大文本舱，再长内容也完美装下。</p>
            </div>
            <div class="flex gap-8 border-t md:border-t-0 pt-4 md:pt-0 border-blue-900/50 w-full md:w-auto font-serif">
                <div class="text-center md:text-left">
                    <span class="block text-[10px] font-black text-rose-300 tracking-wider mb-1 uppercase">🚨 今日截止需复习</span>
                    <span class="text-4xl font-black tracking-tighter text-rose-400" id="dueCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
                <div class="text-center md:text-left border-l border-blue-900/60 pl-8">
                    <span class="block text-[10px] font-black text-sky-300 tracking-wider mb-1 uppercase">📦 语法库总储备</span>
                    <span class="text-4xl font-black tracking-tighter text-sky-200" id="totalCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
            
            <div class="lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase block border-b border-slate-100 pb-2">01 / SMART INPUT FLOW (自由无感录入)</span>
                    
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-1.5">
                        <label class="block text-[11px] font-black text-[#1E3A8A]">✨ 自由乱序输入/粘贴框</label>
                        <textarea id="vSmartPaste" rows="4" oninput="handleSmartSplit()" placeholder="直接把听抄的整段文本糊在这里，下方全自动进行分流特征识别..." class="w-full p-2.5 bg-white rounded-lg text-xs font-medium border-dashed text-slate-700"></textarea>
                    </div>

                    <div class="w-full border-t border-slate-100 my-2"></div>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">日文语法点/词汇</label>
                            <input type="text" id="vWord" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">级别</label>
                            <select id="vLevel" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-700">
                                <option value="N2">N2 核心</option><option value="N3" selected>N3 核心</option><option value="N4">N4 基础</option><option value="N5">N5 基础</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">日文汉字标记</label>
                        <input type="text" id="vFurigana" class="w-full p-2.5 rounded-lg text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文翻译</label>
                        <input type="text" id="vTranslation" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文语法功能解释</label>
                        <input type="text" id="vMeaning" class="w-full p-2.5 rounded-lg text-xs text-slate-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">接续规则 (支持自动多行换行)</label>
                        <textarea id="vConnection" rows="2" placeholder="例: 动词辞书形/た形/ない形＋とともに&#10;名词＋にともなって" class="w-full p-2.5 rounded-lg text-xs text-slate-600 leading-relaxed"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">听抄日文例句/场景备注</label>
                        <textarea id="vMemo" rows="2" class="w-full p-2.5 rounded-lg text-xs"></textarea>
                    </div>
                    <button onclick="saveNewVocab()" class="w-full text-xs font-black tracking-widest py-3 bg-[#1E3A8A] hover:bg-blue-900 text-white rounded-lg transition cursor-pointer shadow-sm">
                        📥 安全存入自查文法库
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-xs space-y-3">
                    <span class="text-xs font-black tracking-widest text-slate-400 uppercase block">数据迁移保护盾</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportBackupData()" class="p-2 border border-dashed border-slate-300 rounded-lg text-center font-bold text-slate-600 hover:bg-slate-50 cursor-pointer">
                            📤 备份导出文法库
                        </button>
                        <label class="p-2 border border-dashed border-slate-300 rounded-lg text-center font-bold text-slate-600 hover:bg-slate-50 cursor-pointer block">
                            📥 导入恢复文法库
                            <input type="file" id="importFile" class="hidden" onchange="importBackupData(this)">
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col min-h-[480px] md:min-h-[540px] order-1 lg:order-2">
                <div class="border-b border-slate-100 pb-3 mb-6 flex justify-between items-center">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase">02 / MEMORY COCKPIT (智能自查舱)</span>
                    <div class="flex items-center gap-4">
                        <button onclick="deleteCurrentCard()" id="deleteBtn" class="text-[10px] font-bold text-slate-300 hover:text-red-600 transition cursor-pointer hidden">
                            🗑️ 删除此条
                        </button>
                        <span class="text-[10px] font-mono text-gray-400" id="cardIndexText">0 / 0</span>
                    </div>
                </div>

                <div id="cardCockpit" class="flex-1 flex flex-col justify-between space-y-8">
                    <div id="emptyState" class="text-center py-20 italic text-slate-400 text-xs">
                        🎉 太棒了！当前待自查复习的语法点已通关清零！
                    </div>

                    <div id="activeCard" class="space-y-6 flex-1 flex flex-col justify-between hidden">
                        <div class="space-y-2 flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <span id="cardLevel" class="inline-block text-[9px] font-black px-1.5 py-0.5 bg-blue-50 text-[#1E3A8A] rounded">N3</span>
                                <h1 id="cardWord" class="text-3xl md:text-4xl font-black font-serif tracking-wide text-slate-900 pt-2 break-words">加载中...</h1>
                            </div>
                            <button onclick="speakJapanese()" class="p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-sm font-bold text-slate-700 cursor-pointer transition shadow-sm flex items-center gap-1.5 shrink-0" title="朗读纯正日文原音">
                                🔊 朗读原音
                            </button>
                        </div>

                        <div id="hiddenZone" class="bg-slate-50 border border-slate-100 p-4 md:p-5 rounded-xl space-y-3 opacity-100 transition-opacity">
                            <div class="blur-md pointer-events-none select-none transition-all duration-300" id="blurWrapper">
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center" onclick="makeEditable('furigana')">
                                    汉字标记：<span id="cardFuriganaContainer" class="inline-block ml-1 flex-1 font-serif text-sm text-slate-800 font-bold"><span id="cardFurigana"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('translation')">
                                    中文翻译：<span id="cardTranslationContainer" class="inline-block ml-1 flex-1 text-base text-blue-900 font-bold"><span id="cardTranslation"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('meaning')">
                                    功能解释：<span id="cardMeaningContainer" class="inline-block ml-1 flex-1 text-xs text-slate-600"><span id="cardMeaning"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-1 block" onclick="makeEditable('connection')">
                                    接续规则：
                                    <div id="cardConnectionContainer" class="text-slate-700 text-xs font-mono bg-white/60 p-2 rounded border border-slate-200/50 mt-1 leading-relaxed whitespace-pre-wrap"><span id="cardConnection"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-2 border-t border-slate-200/60 pt-2" onclick="makeEditable('memo')">
                                    听抄例句/场景备注：
                                    <div id="cardMemoContainer" class="text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap"><span id="cardMemo"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                            </div>
                            <div id="triggerBtnBox" class="text-center py-4">
                                <button onclick="revealCard()" id="revealBtn" class="w-full md:w-auto px-6 py-2.5 bg-slate-800 text-white font-bold text-xs rounded-full hover:bg-black transition cursor-pointer shadow-sm">
                                    👁️ 脑补完毕，查看隐藏答案
                                </button>
                            </div>
                        </div>

                        <div id="decisionBox" class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 hidden">
                            <button onclick="handleDecision(false)" class="py-3 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold border border-rose-200 hover:bg-rose-100 transition cursor-pointer text-center">
                                ❌ 没想起来 (重置)
                            </button>
                            <button onclick="handleDecision(true)" class="py-3 bg-blue-800 text-white rounded-lg text-xs font-bold hover:bg-blue-900 transition cursor-pointer text-center shadow-sm">
                                ✅ 顺利通过 (晋级)
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const EBBINGHAUS_INTERVALS = [0, 1, 24, 72, 168, 360];
        let localVocabDB = []; let dueCardsPool = []; let currentIndex = 0; let isRevealedStatus = false;

        window.onload = function() {
            initVocabEngine();
        };

        function handleSmartSplit() {
            const rawText = document.getElementById('vSmartPaste').value;
            if (!rawText.trim()) return;

            let chunks = rawText.split(/[\n，,；;／\/|\t]/).map(c => c.trim()).filter(c => c.length > 0);
            if (chunks.length === 0) return;

            let dWord = "", dFurigana = "", dTranslation = "", dMeaning = "", dConnection = "", dMemo = "";

            const hasJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/;
            const hasChinese = /[\u4e00-\u9fa5]/;

            chunks.forEach((chunk) => {
                if (hasJapanese.test(chunk) && (chunk.includes('。') || chunk.includes('、') || chunk.length > 12) && !hasChinese.test(chunk)) {
                    if (!dMemo) { dMemo = chunk; return; }
                }
                if (hasJapanese.test(chunk) && chunk.length <= 12 && !hasChinese.test(chunk)) {
                    if (!dWord) { dWord = chunk; return; }
                    if (dWord && !dFurigana) { dFurigana = chunk.replace(/[\(\)（）\[\]]/g, ""); return; }
                }
                if (hasChinese.test(chunk) && chunk.length <= 8) {
                    if (!dTranslation) { dTranslation = chunk; return; }
                }
                if (chunk.length > 6) {
                    if (chunk.includes('+') || chunk.includes('＋') || chunk.includes('名') || chunk.includes('形') || chunk.includes('辞书') || chunk.includes('た形') || chunk.includes('ない形')) {
                        if (!dConnection) { dConnection = chunk; return; }
                    } else if (hasChinese.test(chunk)) {
                        if (!dMeaning) { dMeaning = chunk; return; }
                    }
                }
            });

            if (!dWord && chunks[0]) dWord = chunks[0];
            if (!dTranslation && chunks[1] && hasChinese.test(chunks[1])) dTranslation = chunks[1];

            if (dWord) document.getElementById('vWord').value = dWord;
            document.getElementById('vFurigana').value = dFurigana;
            if (dTranslation) document.getElementById('vTranslation').value = dTranslation;
            document.getElementById('vMeaning').value = dMeaning;
            document.getElementById('vConnection').value = dConnection;
            document.getElementById('vMemo').value = dMemo;
        }

        function initVocabEngine() {
            let data = localStorage.getItem('MZ_JAP_GRAMMAR_DB');
            if (!data) {
                data = localStorage.getItem('MZ_JAP_VOCAB_DB'); 
                if (data) { localStorage.setItem('MZ_JAP_GRAMMAR_DB', data); }
            }
            localVocabDB = data ? JSON.parse(data) : [];
            refreshEngineState();
            if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
        }

        function speakJapanese() {
            if (!('speechSynthesis' in window)) { alert("当前浏览器不支持语音合成功能。"); return; }
            if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); }

            const card = dueCardsPool[currentIndex];
            if (!card) return;

            let textToSpeak = card.word;
            if (isRevealedStatus && card.memo && card.memo !== '暂无详细笔记。') {
                textToSpeak += "。 " + card.memo;
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';

            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang.includes('ja') && (v.name.includes('Natural') || v.name.includes('Online')));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Google'));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('ja') && (v.name.includes('Premium') || v.name.includes('Kyoko') || v.name.includes('Ichiro')));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('ja-JP') || v.lang.includes('ja_JP'));

            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.rate = 0.82; 
            window.speechSynthesis.speak(utterance);
        }

        function refreshEngineState() {
            const now = Date.now();
            dueCardsPool = [];
            localVocabDB.forEach(item => {
                const hoursPassed = (now - item.lastTime) / (1000 * 60 * 60);
                const currentStage = item.stage || 0;
                if (currentStage < EBBINGHAUS_INTERVALS.length) {
                    const req = EBBINGHAUS_INTERVALS[currentStage];
                    if (hoursPassed >= req) dueCardsPool.push(item);
                }
            });
            document.getElementById('totalCount').innerText = localVocabDB.length;
            document.getElementById('dueCount').innerText = dueCardsPool.length;
            renderActiveCard();
        }

        function renderActiveCard() {
            const emptyState = document.getElementById('emptyState');
            const activeCard = document.getElementById('activeCard');
            const cardIndexText = document.getElementById('cardIndexText');
            const deleteBtn = document.getElementById('deleteBtn');

            if (dueCardsPool.length === 0) {
                emptyState.classList.remove('hidden');
                activeCard.classList.add('hidden');
                deleteBtn.classList.add('hidden');
                cardIndexText.innerText = "0 / 0";
                return;
            }

            emptyState.classList.add('hidden');
            activeCard.classList.remove('hidden');
            deleteBtn.classList.remove('hidden'); 
            
            if (currentIndex >= dueCardsPool.length) currentIndex = 0;
            cardIndexText.innerText = `${currentIndex + 1} / ${dueCardsPool.length}`;

            const card = dueCardsPool[currentIndex];
            document.getElementById('cardLevel').innerText = card.level;
            document.getElementById('cardWord').innerText = card.word;
            isRevealedStatus = false;
            
            resetDOM('cardFuriganaContainer', card.furigana || '无', 'text-slate-800 text-sm font-bold font-serif');
            resetDOM('cardTranslationContainer', card.translation || card.meaning || '未填写中文翻译', 'text-[#1E3A8A] text-base font-bold');
            resetDOM('cardMeaningContainer', card.meaning || '暂无详细功能解释。', 'text-slate-500 text-xs');
            
            // 💡 渲染优化：接续规则支持换行原味呈现
            resetDOM('cardConnectionContainer', card.connection || '暂无接续规则配置。', 'text-slate-700 text-xs font-mono whitespace-pre-wrap');
            resetDOM('cardMemoContainer', card.memo || '暂无详细笔记。', 'text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap');

            document.getElementById('blurWrapper').className = "blur-md pointer-events-none select-none transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.remove('hidden');
            document.getElementById('decisionBox').classList.add('hidden');
        }

        function resetDOM(id, text, cls) {
            document.getElementById(id).innerHTML = `<span class="${cls}">${text}</span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span>`;
        }

        function revealCard() {
            document.getElementById('blurWrapper').className = "transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.add('hidden');
            document.getElementById('decisionBox').classList.remove('hidden');
            isRevealedStatus = true;
        }

        function makeEditable(key) {
            if (!isRevealedStatus) return;
            const card = dueCardsPool[currentIndex];
            let id = key === 'furigana' ? 'cardFuriganaContainer' : (key === 'translation' ? 'cardTranslationContainer' : (key === 'meaning' ? 'cardMeaningContainer' : (key === 'connection' ? 'cardConnectionContainer' : 'cardMemoContainer')));
            
            const container = document.getElementById(id);
            if (container.querySelector('input') || container.querySelector('textarea')) return;

            let val = card[key] || "";
            if(key === 'translation' && !card.translation && card.meaning) val = card.meaning;

            // 💡 原地修改进化：如果点击的是例句（memo）或者接续规则（connection），全自动召唤多行大文本框，其余用普通 input
            let el = (key === 'memo' || key === 'connection') ? `<textarea class="live-edit-input text-xs" rows="3">${val}</textarea>` : `<input type="text" class="live-edit-input" value="${val}" />`;
            
            container.innerHTML = el;
            const input = container.children[0];
            input.focus();

            input.onblur = function() {
                const newText = input.value.trim();
                const matched = localVocabDB.find(i => i.id === card.id);
                if (matched) {
                    matched[key] = newText;
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                }
                if (key === 'furigana') resetDOM(id, newText || '无', 'text-slate-800 text-sm font-bold font-serif');
                if (key === 'translation') resetDOM(id, newText || '未填写中文翻译', 'text-[#1E3A8A] text-base font-bold');
                if (key === 'meaning') resetDOM(id, newText || '暂无详细功能解释。', 'text-slate-500 text-xs');
                if (key === 'connection') resetDOM(id, newText || '暂无接续规则配置。', 'text-slate-700 text-xs font-mono whitespace-pre-wrap');
                if (key === 'memo') resetDOM(id, newText || '暂无详细笔记。', 'text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap');
                card[key] = newText;
            };
        }

        function handleDecision(yes) {
            const card = dueCardsPool[currentIndex];
            const matched = localVocabDB.find(i => i.id === card.id);
            if (matched) {
                matched.stage = yes ? (matched.stage || 0) + 1 : 1;
                matched.lastTime = Date.now();
                localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                refreshEngineState();
            }
        }

        function deleteCurrentCard() {
            const card = dueCardsPool[currentIndex];
            if (!card) return;
            if (confirm(`⚠️ 确定要从系统文法库中彻底删除【${card.word}】吗？`)) {
                localVocabDB = localVocabDB.filter(item => item.id !== card.id);
                localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                alert("🗑️ 该记录已成功销毁。");
                if (currentIndex > 0) currentIndex--;
                refreshEngineState();
            }
        }

        function saveNewVocab() {
            const word = document.getElementById('vWord').value.trim();
            const level = document.getElementById('vLevel').value;
            const furigana = document.getElementById('vFurigana').value.trim();
            const translation = document.getElementById('vTranslation').value.trim();
            const meaning = document.getElementById('vMeaning').value.trim();
            const connection = document.getElementById('vConnection').value.trim();
            const memo = document.getElementById('vMemo').value.trim();
            if (!word || !translation) return alert("智能提取失败或未填全。请至少保证有日语语法点与中文翻译项。");

            localVocabDB.push({ 
                id: 'g_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), 
                word, level, furigana, translation, meaning, connection, memo, stage: 0, lastTime: Date.now() 
            });
            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
            
            ['vWord','vFurigana','vTranslation','vMeaning','vConnection','vMemo','vSmartPaste'].forEach(id => document.getElementById(id).value = '');
            refreshEngineState();
        }
    </script>
