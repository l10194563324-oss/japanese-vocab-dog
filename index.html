<!DOCTYPE html>

    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        input, select, textarea { background-color: #FFFFFF; border: 1px solid #E2E8F0 !important; transition: all 0.15s ease; border-radius: 6px; }
        input:focus, select:focus, textarea:focus { border-color: #0F172A !important; box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.05); outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ✏️ 原地快捷修改大文本编辑舱样式 */
        .live-edit-input { border: 1px dashed #3B82F6 !important; background-color: #FFF !important; padding: 6px 10px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 6px; color: #0F172A; line-height: 1.6; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen flex justify-center items-start bg-[#F8FAFC]">

                </div>

                </button>

        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
            
            <div class="lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200/60 shadow-xs space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#0F172A] uppercase block border-b border-slate-100 pb-2 font-serif">01 / SMART INPUT FLOW (自由无感录入)</span>
                    
                    <div class="bg-slate-50/80 p-3 rounded-lg border border-slate-200 space-y-1.5">

                    <span class="text-xs font-black tracking-widest text-[#0F172A] uppercase font-serif" id="cockpitTitle">02 / SELF-CHECK COCKPIT (自查核心舱)</span>
                    <div class="flex items-center gap-4">

                    </div>
                </div>

                <div id="cardCockpit" class="flex-1 flex flex-col justify-between space-y-8">
                    <div id="emptyState" class="text-center py-16 flex flex-col items-center justify-center space-y-4 hidden">
                        <span class="text-xs italic text-slate-400">🎉 所有复习任务已全部通关清零！</span>
                        <button onclick="startInfiniteReviewMode()" class="px-6 py-3 bg-[#0F172A] text-white hover:bg-slate-800 font-bold text-xs rounded-xl shadow-md transition cursor-pointer flex items-center gap-2">
                            🔄 开启无限自由复习 / 再次学习
                        </button>
                    </div>

                    <div id="activeCard" class="space-y-6 flex-1 flex flex-col justify-between hidden">
                        <div class="space-y-2 flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <span id="cardLevel" class="inline-block text-[9px] font-black px-1.5 py-0.5 bg-slate-100 text-[#0F172A] rounded font-mono">N3</span>
                                <h1 id="cardWord" class="text-3xl md:text-4xl font-black font-serif tracking-wide text-slate-900 pt-2 break-words">加载中...</h1>
                            </div>
                            <button onclick="speakJapanese()" class="p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-sm font-bold text-slate-700 cursor-pointer transition shadow-sm flex items-center gap-1.5 shrink-0">

                            </button>
                        </div>

                        <div id="hiddenZone" class="bg-slate-50/50 border border-slate-100 p-4 md:p-5 rounded-xl space-y-3 opacity-100 transition-opacity">
                            <div class="blur-md pointer-events-none select-none transition-all duration-300" id="blurWrapper">
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center" onclick="makeEditable('furigana')">
                                    汉字标记：<span id="cardFuriganaContainer" class="inline-block ml-1 flex-1 font-serif text-sm text-slate-800 font-bold"><span id="cardFurigana"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('translation')">
                                    中文翻译：<span id="cardTranslationContainer" class="inline-block ml-1 flex-1 text-base text-[#0F172A] font-bold"><span id="cardTranslation"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('meaning')">
                                    功能解释：<span id="cardMeaningContainer" class="inline-block ml-1 flex-1 text-xs text-slate-600 leading-relaxed"><span id="cardMeaning"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-1 block" onclick="makeEditable('connection')">
                                    接续规则：
                                    <div id="cardConnectionContainer" class="text-slate-700 text-xs font-mono bg-white p-2 rounded border border-slate-200/40 mt-1 leading-relaxed whitespace-pre-wrap min-h-[32px]"><span id="cardConnection"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-2 border-t border-slate-200/60 pt-2" onclick="makeEditable('memo')">

                                    <div id="cardMemoContainer" class="text-slate-700 font-sans mt-1 text-xs leading-relaxed whitespace-pre-wrap min-h-[48px] bg-white p-2 rounded border border-slate-200/40"><span id="cardMemo"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                            </div>
                            <div id="triggerBtnBox" class="text-center py-4">
                                <button onclick="revealCard()" id="revealBtn" class="w-full md:w-auto px-6 py-2.5 bg-slate-800 text-white font-bold text-xs rounded-full hover:bg-black transition cursor-pointer shadow-sm tracking-wider font-serif">
                                    👁 脑补完毕，查看答案
                                </button>
                            </div>
                        </div>

                        <div id="decisionBox" class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 hidden">
                            <button onclick="handleDecision(false)" class="py-3 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold border border-rose-200 hover:bg-rose-100 transition cursor-pointer text-center">
                                ❌ 没想起来

                            <button onclick="handleDecision(true)" class="py-3 bg-[#0F172A] text-white rounded-lg text-xs font-bold hover:bg-slate-800 transition cursor-pointer text-center shadow-sm">
                                ✅ 顺利通过

                    </div>
                </div>
            </div>

        </div>

        <div class="w-full bg-white rounded-xl border border-slate-200/60 shadow-xs overflow-hidden mt-2">
            <div class="bg-slate-50 px-5 py-4 flex justify-between items-center border-b border-slate-200 cursor-pointer" onclick="toggleDatabasePanel()">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-[#0F172A] uppercase tracking-wider font-serif">📚 WHOLE GRAMMAR DATABASE (全量活页题库)</span>
                    <span class="text-[10px] bg-slate-200 text-[#0F172A] font-bold px-2 py-0.5 rounded-full font-mono" id="dbTotalBadge">0 条</span>
                </div>
                <span id="foldArrow" class="text-xs font-bold text-slate-400">展开 ➕</span>
            </div>
            <div id="databasePanelBody" class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden max-h-[600px] overflow-y-auto no-scrollbar bg-slate-50/50">
            </div>
        </div>

    </div>

    <script>
        const EBBINGHAUS_INTERVALS = [0, 1, 24, 72, 168, 360];
        let localVocabDB = []; let dueCardsPool = []; let currentIndex = 0; let isRevealedStatus = false;
        let isInfiniteReviewMode = false;
        let cloudSha = null;

        window.onload = function() {
            loadCloudConfigFromLocal();
            initVocabEngine();
        };

        function loadCloudConfigFromLocal() {
            document.getElementById('ghUser').value = localStorage.getItem('MZ_GH_USER') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('MZ_GH_REPO') || 'japanese-vocab-dog';
            document.getElementById('ghToken').value = localStorage.getItem('MZ_GH_TOKEN') || '';
        }

        function saveCloudConfig() {
            localStorage.setItem('MZ_GH_USER', document.getElementById('ghUser').value.trim());
            localStorage.setItem('MZ_GH_REPO', document.getElementById('ghRepo').value.trim());
            localStorage.setItem('MZ_GH_TOKEN', document.getElementById('ghToken').value.trim());
            fetchFromCloud(true);
        }

        async function fetchFromCloud(showAlert = false) {
            const user = localStorage.getItem('MZ_GH_USER');
            const repo = localStorage.getItem('MZ_GH_REPO');
            const token = localStorage.getItem('MZ_GH_TOKEN');
            if(!user || !token) return;

            const url = `https://api.github.com/repos/${user}/${repo}/contents/database.json`;
            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if(res.status === 200) {
                    const json = await res.json();
                    cloudSha = json.sha;
                    const decodedData = decodeURIComponent(escape(atob(json.content)));
                    localVocabDB = JSON.parse(decodedData);
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', decodedData);
                    refreshEngineState();
                    if(showAlert) alert("☁️ 恭喜！云端题库对齐成功，所有数据完美同步到位！");
                } else if(res.status === 404) {
                    if(showAlert) alert("☁️ 云端目前没有历史文件，系统会自动帮您本地的错题同步推送上去。");
                    pushToCloud();
                }
            } catch(e) { 
                console.error(e);
                if(showAlert) alert("❌ 云同步连网失败，请确认密钥与网络。");
            }
        }

        async function pushToCloud() {
            const user = localStorage.getItem('MZ_GH_USER');
            const repo = localStorage.getItem('MZ_GH_REPO');
            const token = localStorage.getItem('MZ_GH_TOKEN');
            if(!user || !token) return;

            const url = `https://api.github.com/repos/${user}/${repo}/contents/database.json`;
            try {
                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(localVocabDB))));
                const body = { message: "🗃️ Sync Database via MZ.Edu App", content: contentBase64 };
                if(cloudSha) body.sha = cloudSha;

                fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                }).then(res => {
                    if(res.status === 200 || res.status === 201) {
                        res.json().then(json => { cloudSha = json.content.sha; console.log("☁️ 后台云端同步成功。"); });
                    }
                }).catch(err => console.error("同步异常:", err));
            } catch(e) { console.error(e); }
        }

        function handleSmartSplit() {
            const rawText = document.getElementById('vSmartPaste').value;
            if (!rawText.trim()) return;

            let chunks = rawText.split('\n').map(c => c.trim()).filter(c => c.length > 0);
            if (chunks.length <= 1) chunks = rawText.split(/[\uff0c,；;／\/|\t]/).map(c => c.trim()).filter(c => c.length > 0);
            if (chunks.length === 0) return;

            let dWord = "", dFurigana = "", dTranslation = "", dMeaning = "", dMemo = [];
            let dConnection = "";

            const hasJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/;
            const hasChinese = /[\u4e00-\u9fa5]/;

            chunks.forEach((chunk) => {
                if (chunk.includes('+') || chunk.includes('＋') || chunk.includes('名') || chunk.includes('形') || chunk.includes('简体') || chunk.includes('词干') || chunk.includes('て形')) {
                    dConnection = chunk; return;
                }
                if (hasJapanese.test(chunk) && (chunk.includes('。') || chunk.includes('、') || chunk.length > 12) && !hasChinese.test(chunk)) {
                    dMemo.push(chunk); return;
                }
                if (hasJapanese.test(chunk) && chunk.length <= 12 && !hasChinese.test(chunk)) {
                    if (!dWord) { dWord = chunk; return; }
                    if (dWord && !dFurigana) { dFurigana = chunk; return; }
                }
                if (hasChinese.test(chunk) && chunk.length <= 10) {
                    if (!dTranslation) { dTranslation = chunk; return; }
                }
                if (hasChinese.test(chunk) && chunk.length > 10) {
                    if (dMemo.length > 0) { dMemo.push(chunk); } 
                    else { if (!dMeaning) { dMeaning = chunk; return; } }
                }
            });

            if (!dWord && chunks[0]) dWord = chunks[0];
            if (!dTranslation && chunks[1] && hasChinese.test(chunks[1])) dTranslation = chunks[1];

            if (dWord) document.getElementById('vWord').value = dWord;
            document.getElementById('vFurigana').value = dFurigana;
            if (dTranslation) document.getElementById('vTranslation').value = dTranslation;
            document.getElementById('vMeaning').value = dMeaning;
            document.getElementById('vConnection').value = dConnection;
            if (dMemo.length > 0) document.getElementById('vMemo').value = dMemo.join('\n');
        }

        function initVocabEngine() {
            let rawData = null;
            try { rawData = localStorage.getItem('MZ_JAP_GRAMMAR_DB'); } catch(e) {}
            if (!rawData) { try { rawData = localStorage.getItem('MZ_JAP_VOCAB_DB'); } catch(e) {} }

            let parsedDB = [];
            if (rawData) { try { parsedDB = JSON.parse(rawData); } catch(e) {} }
            localVocabDB = Array.isArray(parsedDB) ? parsedDB : [];
            
            localVocabDB = localVocabDB.map(item => {
                if (!item || typeof item !== 'object') return null;
                if (!item.translation) item.translation = item.meaning || item.word || "未指定翻译";
                if (!item.meaning) item.meaning = "暂无详细功能解释。";
                if (!item.connection) item.connection = "暂无接续规则。";
                if (!item.memo) item.memo = "暂无详细笔记。";
                if (!item.id) item.id = 'g_' + Math.random().toString(36).substr(2, 9);
                return item;
            }).filter(item => item !== null && item.word);

            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
            refreshEngineState();
            fetchFromCloud(false);
        }

        function speakJapanese(customText) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 

            let textToSpeak = "";
            if (customText) {
                textToSpeak = customText;
            } else {
                const card = dueCardsPool[currentIndex];
                if (!card) return;
                textToSpeak = card.word;
                if (isRevealedStatus && card.memo && card.memo !== '暂无详细笔记。') {
                    let lines = card.memo.split('\n');
                    if (lines[0]) textToSpeak += "。 " + lines[0];
                }
            }

            if (!textToSpeak.trim()) return;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP';
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang.includes('ja') && (v.name.includes('Natural') || v.name.includes('Online')));
            if (selectedVoice) utterance.voice = selectedVoice;

            utterance.rate = 0.82; 
            window.speechSynthesis.speak(utterance);
        }

        function refreshEngineState() {
            const now = Date.now();
            if (!isInfiniteReviewMode) {
                document.getElementById('dueTitle').innerText = "🚨 今日截止需复习";
                document.getElementById('cockpitTitle').innerText = "02 / SELF-CHECK COCKPIT (自查核心舱)";
                dueCardsPool = [];
                localVocabDB.forEach(item => {
                    const hoursPassed = (now - item.lastTime) / (1000 * 60 * 60);
                    const currentStage = item.stage || 0;
                    if (currentStage < EBBINGHAUS_INTERVALS.length) {
                        const req = EBBINGHAUS_INTERVALS[currentStage];
                        if (hoursPassed >= req) dueCardsPool.push(item);
                    }
                });
                document.getElementById('dueCount').innerText = dueCardsPool.length;
            } else {
                document.getElementById('dueTitle').innerText = "🔄 自由刷题再练模式中";
                document.getElementById('dueCount').innerText = dueCardsPool.length;
            }

            document.getElementById('totalCount').innerText = localVocabDB.length;
            document.getElementById('dbTotalBadge').innerText = `${localVocabDB.length} 条`;
            
            renderActiveCard();
            renderWholeDatabaseList(); 
        }

        function startInfiniteReviewMode() {
            if (localVocabDB.length === 0) return;
            isInfiniteReviewMode = true;
            dueCardsPool = [...localVocabDB].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            document.getElementById('dueTitle').innerText = "🔄 自由刷题再练模式中";
            refreshEngineState();
        }

        function renderActiveCard() {
            const emptyState = document.getElementById('emptyState');
            const activeCard = document.getElementById('activeCard');
            const cardIndexText = document.getElementById('cardIndexText');
            const deleteBtn = document.getElementById('deleteBtn');

            if (dueCardsPool.length === 0) {
                emptyState.classList.remove('hidden'); activeCard.classList.add('hidden'); deleteBtn.classList.add('hidden');
                document.getElementById('cardIndexText').innerText = "0 / 0"; return;
            }

            emptyState.classList.add('hidden'); activeCard.classList.remove('hidden'); deleteBtn.classList.remove('hidden'); 
            if (currentIndex >= dueCardsPool.length) {
                if (isInfiniteReviewMode) dueCardsPool = [...localVocabDB].sort(() => Math.random() - 0.5);
                currentIndex = 0;
            }
            cardIndexText.innerText = `${currentIndex + 1} / ${dueCardsPool.length}`;

            const card = dueCardsPool[currentIndex];
            document.getElementById('cardLevel').innerText = card.level;
            document.getElementById('cardWord').innerText = card.word;
            isRevealedStatus = false;
            
            resetDOM('cardFuriganaContainer', card.furigana || '无', 'text-slate-800 text-sm font-bold font-serif');
            resetDOM('cardTranslationContainer', card.translation || '未填写中文翻译', 'text-[#0F172A] text-base font-bold');
            resetDOM('cardMeaningContainer', card.meaning || '暂无详细功能解释。', 'text-slate-500 text-xs');
            resetDOM('cardConnectionContainer', card.connection || '暂无接续规则配置。', 'text-slate-700 text-xs font-mono whitespace-pre-wrap');
            resetDOM('cardMemoContainer', card.memo || '暂无详细笔记。', 'text-slate-700 font-sans mt-1 text-xs leading-relaxed whitespace-pre-wrap');

            document.getElementById('blurWrapper').className = "blur-md pointer-events-none select-none transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.remove('hidden');
            document.getElementById('decisionBox').classList.add('hidden');
        }

        function resetDOM(id, text, cls) {
            const el = document.getElementById(id);
            if(el) el.innerHTML = `<span class="${cls}">${text}</span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span>`;
        }

        function revealCard() {
            document.getElementById('blurWrapper').className = "transition-all duration-300";
            document.getElementById('triggerBtnBox').classList.add('hidden');
            document.getElementById('decisionBox').className = "grid grid-cols-2 gap-4 pt-4 border-t border-slate-100";
            isRevealedStatus = true;
        }

        // 💡 重点复位校准：彻底闭合了第 265 行的条件阻断括号，全系统底层函数恢复通畅
        function makeEditable(key) {
            if (!isRevealedStatus) return;
            const card = dueCardsPool[currentIndex];
            let id = key === 'furigana' ? 'cardFuriganaContainer' : (key === 'translation' ? 'cardTranslationContainer' : (key === 'meaning' ? 'cardMeaningContainer' : (key === 'connection' ? 'cardConnectionContainer' : 'cardMemoContainer')));
            
            const container = document.getElementById(id);
            if (container.querySelector('input') || container.querySelector('textarea')) return;

            let val = card[key] || "";
            let editEl = (key === 'memo' || key === 'connection' || key === 'meaning') 
                         ? `<textarea class="live-edit-input text-xs" rows="4">${val}</textarea>` 
                         : `<input type="text" class="live-edit-input" value="${val}" />`;
            
            container.innerHTML = editEl;
            const input = container.children[0];
            input.focus();

            input.onblur = function() {
                const newText = input.value.trim();
                const matched = localVocabDB.find(i => i.id === card.id);
                if (matched) {
                    matched[key] = newText;
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                    pushToCloud();
                }
                card[key] = newText;
                if (key === 'furigana') { resetDOM(id, newText || '无', 'text-slate-800 text-sm font-bold font-serif'); }
                if (key === 'translation') { resetDOM(id, newText || '未填写中文翻译', 'text-[#0F172A] text-base font-bold'); }
                if (key === 'meaning') { resetDOM(id, newText || '暂无详细功能解释。', 'text-slate-500 text-xs'); }
                if (key === 'connection') { resetDOM(id, newText || '暂无接续规则配置。', 'text-slate-700 text-xs font-mono whitespace-pre-wrap'); }
                if (key === 'memo') { resetDOM(id, newText || '暂无详细笔记。', 'text-slate-700 font-sans mt-1 text-xs leading-relaxed whitespace-pre-wrap'); }
            };
        }

        function handleDecision(yes) {
            const card = dueCardsPool[currentIndex];
            const matched = localVocabDB.find(i => i.id === card.id);
            if (matched) {
                if (!isInfiniteReviewMode) {
                    matched.stage = yes ? (matched.stage || 0) + 1 : 1;
                    matched.lastTime = Date.now();
                    localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                    pushToCloud();
                }
                currentIndex++;
                refreshEngineState();
            }
        }

        function deleteCurrentCard() {
            const card = dueCardsPool[currentIndex];
            if (confirm(`⚠️ 确定要彻底删除语法【${card.word}】吗？`)) {
                localVocabDB = localVocabDB.filter(item => item.id !== card.id);
                localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
                pushToCloud();
                if (currentIndex > 0) currentIndex--; 
                refreshEngineState();
            }
        }

        function renderWholeDatabaseList() {
            const container = document.getElementById('databasePanelBody');
            container.innerHTML = "";
            if (localVocabDB.length === 0) return;
            localVocabDB.forEach((item) => {
                const cardEl = document.createElement('div');
                cardEl.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex flex-col justify-between space-y-3 relative hover:border-[#0F172A] transition-all";
                
                let firstLineJa = item.memo ? item.memo.split('\n')[0] : '';
                let jaAudioText = (item.word + (firstLineJa ? '。' + firstLineJa : '')).replace(/[\r\n]/g, " ").replace(/'/g, "\\'");

                cardEl.innerHTML = `
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded font-mono">${item.level}</span>
                            <div class="flex gap-2">
                                <button onclick="speakJapanese('${jaAudioText}')" class="text-xs hover:scale-110 transition cursor-pointer" title="点播发音">🔊</button>
                                <button onclick="forceFocusCard('${item.id}')" class="text-xs text-slate-300 hover:text-[#0F172A] transition cursor-pointer" title="突击此条">➔</button>
                            </div>
                        </div>
                        <h4 class="font-serif font-bold text-slate-900 text-lg">${item.word}</h4>
                        <div class="text-[11px] text-slate-400 font-serif">汉字：<span class="text-slate-700 font-bold">${item.furigana || '无'}</span></div>
                        <div class="text-xs text-blue-900 font-bold">翻译：<span>${item.translation || '未填写'}</span></div>
                        <div class="text-[11px] text-slate-500">解释：<span>${item.meaning || '无'}</span></div>
                        <div class="text-[11px] text-slate-500 font-mono bg-slate-50 p-1.5 rounded border border-slate-100 whitespace-pre-wrap">接续：${item.connection || '无'}</div>
                        <div class="text-[11px] text-slate-600 italic bg-blue-50/40 p-1.5 rounded border border-blue-50/30 whitespace-pre-wrap">例句与翻译：<br><span class="font-sans">${item.memo || '无'}</span></div>
                    </div>`;
                container.appendChild(cardEl);
            });
        }

        function forceFocusCard(id) {
            const matched = localVocabDB.find(i => i.id === id);
            if (matched) { isInfiniteReviewMode = true; dueCardsPool = [matched]; currentIndex = 0; refreshEngineState(); window.scrollTo({ top: 100, behavior: 'smooth' }); }
        }

        function toggleDatabasePanel() {
            const body = document.getElementById('databasePanelBody');
            const arrow = document.getElementById('foldArrow');
            if (body.classList.contains('hidden')) {
                body.classList.remove('hidden');
                arrow.innerText = "折叠 ➖";
            } else {
                body.classList.add('hidden');
                arrow.innerText = "展开 ➕";
            }
        }

        function saveNewVocab() {
            const word = document.getElementById('vWord').value.trim();
            const level = document.getElementById('vLevel').value;
            const furigana = document.getElementById('vFurigana').value.trim();
            const translation = document.getElementById('vTranslation').value.trim();
            const meaning = document.getElementById('vMeaning').value.trim();
            const connection = document.getElementById('vConnection').value.trim();
            const memo = document.getElementById('vMemo').value.trim();
            if (!word || !translation) return alert("请检查，日语语法点与中文翻译项为必填项。");

            localVocabDB.push({ 
                id: 'g_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), 
                word, level, furigana, translation, meaning, connection, memo, stage: 0, lastTime: Date.now() 
            });
            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localVocabDB));
            pushToCloud();

            ['vWord','vFurigana','vTranslation','vMeaning','vConnection','vMemo','vSmartPaste'].forEach(id => document.getElementById(id).value = '');
            if(isInfiniteReviewMode) dueCardsPool = [...localVocabDB].sort(() => Math.random() - 0.5);
            refreshEngineState();
        }
    </script>
</body>
</html>
