<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ.Auto SNS Poster Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #0B0F19;
            color: #F3F4F6;
        }
        .canvas-area {
            background-image: radial-gradient(#1E293B 1px, transparent 1px);
            background-size: 16px 16px;
        }
        .layer-active {
            border: 2px solid #3B82F6 !important;
        }
        /* 隐藏滚动条但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Top Navigation Bar -->
    <header class="h-14 border-b border-gray-800 bg-[#111827] px-4 flex items-center justify-between z-10">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="layout"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-wider text-white">MZ.Auto</h1>
                <p class="text-[10px] text-gray-400">Osaka Rental Poster Studio</p>
            </div>
        </div>
        
        <!-- Canvas Ratio Controls -->
        <div class="flex bg-gray-800 p-1 rounded-lg space-x-1">
            <button id="ratio-916" class="px-3 py-1 text-xs rounded font-medium bg-blue-600 text-white flex items-center space-x-1 transition">
                <i data-lucide="smartphone" class="w-3.5 h-3.5"></i>
                <span>9:16 (小红书/海报)</span>
            </button>
            <button id="ratio-11" class="px-3 py-1 text-xs rounded font-medium text-gray-400 hover:text-white flex items-center space-x-1 transition">
                <i data-lucide="square" class="w-3.5 h-3.5"></i>
                <span>1:1 (正方形)</span>
            </button>
        </div>

        <!-- Action Actions -->
        <div>
            <button id="btn-export" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded-lg text-sm font-semibold flex items-center space-x-2 transition shadow-lg shadow-emerald-900/20">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span>高画質エクスポート</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Left Sidebar: Controls & Layers -->
        <aside class="w-80 border-r border-gray-800 bg-[#111827] flex flex-col overflow-y-auto no-scrollbar">
            <!-- Section: Assets Upload -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">素材アップロード</h2>
                <label class="border-2 border-dashed border-gray-700 hover:border-blue-500 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer transition bg-gray-900/50 group">
                    <i data-lucide="image-plus" class="w-8 h-8 text-gray-500 group-hover:text-blue-400 mb-2 transition"></i>
                    <span class="text-xs text-gray-400 group-hover:text-gray-200">車両画像、背景を選択</span>
                    <input type="file" id="upload-img" accept="image/*" class="hidden">
                </label>
            </div>

            <!-- Section: Text Controls -->
            <div class="p-4 border-b border-gray-800 space-y-4">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">テキスト編集</h2>
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">メインタイトル (純日文)</label>
                    <input type="text" id="text-main" value="納豆は、食べられないわけではないが、好きじゃない。" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">サブタイトル / ブランド名</label>
                    <input type="text" id="text-sub" value="MZ.Auto Osaka Rental" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[11px] text-gray-400 block mb-1">文字サイズ</label>
                        <input type="number" id="text-size" value="28" class="w-full bg-gray-900 border border-gray-700 rounded p-1.5 text-sm text-white text-center">
                    </div>
                    <div>
                        <label class="text-[11px] text-gray-400 block mb-1">文字カラー</label>
                        <div class="flex items-center bg-gray-900 border border-gray-700 rounded p-1">
                            <input type="color" id="text-color" value="#FFFFFF" class="w-8 h-7 border-0 bg-transparent cursor-pointer">
                            <span id="text-color-hex" class="text-xs font-mono ml-2 uppercase">#FFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Layer Transformations -->
            <div class="p-4 space-y-4">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">レイヤー変形 (画像)</h2>
                <div>
                    <label class="text-[11px] text-gray-400 flex justify-between mb-1">
                        <span>拡大・縮小</span>
                        <span id="val-scale">1.0x</span>
                    </label>
                    <input type="range" id="layer-scale" min="0.1" max="3" step="0.05" value="1" class="w-full accent-blue-500">
                </div>
                <div>
                    <label class="text-[11px] text-gray-400 flex justify-between mb-1">
                        <span>回転角度</span>
                        <span id="val-rotate">0°</span>
                    </label>
                    <input type="range" id="layer-rotate" min="-180" max="180" step="1" value="0" class="w-full accent-blue-500">
                </div>
            </div>
        </aside>

        <!-- Center Workspace: Interactive Canvas Area -->
        <main class="flex-1 canvas-area flex items-center justify-center p-6 overflow-auto relative">
            
            <!-- Dynamic Canvas Container -->
            <div id="poster-canvas" class="bg-gradient-to-b from-[#1E2530] to-[#0A0D14] shadow-2xl relative overflow-hidden transition-all duration-300 select-none" style="width: 360px; height: 640px;">
                
                <!-- Background Decoration Elements -->
                <div class="absolute inset-0 border border-white/10 pointer-events-none z-10"></div>
                <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
                
                <!-- Image Layer Container -->
                <div id="layer-img-container" class="absolute inset-0 flex items-center justify-center cursor-move" style="transform: translate(0px, 0px) scale(1) rotate(0deg);">
                    <img id="display-img" src="" class="max-w-full max-h-full pointer-events-none hidden object-contain">
                    <div id="img-placeholder" class="text-center text-gray-600 px-6">
                        <i data-lucide="image" class="w-12 h-12 mx-auto mb-2 opacity-30"></i>
                        <p class="text-xs opacity-50">左側から車両画像をアップロードしてください</p>
                    </div>
                </div>

                <!-- Gradient Overlay for Typography Contrast -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent pointer-events-none"></div>

                <!-- Text Layer: Bottom Branding & Copy -->
                <div class="absolute bottom-0 left-0 w-full p-8 z-20 flex flex-col space-y-4">
                    <!-- Brand Tag -->
                    <div class="self-start bg-blue-600/90 text-white text-[10px] font-bold tracking-widest uppercase px-2.5 py-1 rounded shadow-md border border-blue-400/20">
                        <span id="render-sub">MZ.Auto Osaka Rental</span>
                    </div>
                    <!-- Main Pure Japanese Text Line -->
                    <h2 id="render-main" class="text-white font-bold leading-snug tracking-wide break-words drop-shadow-lg" style="font-size: 28px;">
                        納豆は、食べられないわけではないが、好きじゃない。
                    </h2>
                </div>
                
            </div>

            <!-- Hidden Standard Canvas for High-Res Rendering -->
            <canvas id="hidden-export-canvas" class="hidden"></canvas>
        </main>
    </div>

    <!-- Script Block -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // State Management
        let currentRatio = '916'; // '916' or '11'
        let imgState = {
            x: 0,
            y: 0,
            scale: 1,
            rotate: 0,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        // DOM Elements
        const posterCanvas = document.getElementById('poster-canvas');
        const layerImgContainer = document.getElementById('layer-img-container');
        const displayImg = document.getElementById('display-img');
        const imgPlaceholder = document.getElementById('img-placeholder');
        
        // Input Controls
        const uploadImg = document.getElementById('upload-img');
        const textMain = document.getElementById('text-main');
        const textSub = document.getElementById('text-sub');
        const textSize = document.getElementById('text-size');
        const textColor = document.getElementById('text-color');
        const textColorHex = document.getElementById('text-color-hex');
        
        // Transform Sliders
        const layerScale = document.getElementById('layer-scale');
        const layerRotate = document.getElementById('layer-rotate');
        const valScale = document.getElementById('val-scale');
        const valRotate = document.getElementById('val-rotate');

        // Render Targets
        const renderMain = document.getElementById('render-main');
        const renderSub = document.getElementById('render-sub');

        // --- Aspect Ratio Toggle ---
        document.getElementById('ratio-916').addEventListener('click', function() {
            currentRatio = '916';
            posterCanvas.style.width = '360px';
            posterCanvas.style.height = '640px';
            this.className = "px-3 py-1 text-xs rounded font-medium bg-blue-600 text-white flex items-center space-x-1 transition";
            document.getElementById('ratio-11').className = "px-3 py-1 text-xs rounded font-medium text-gray-400 hover:text-white flex items-center space-x-1 transition";
        });

        document.getElementById('ratio-11').addEventListener('click', function() {
            currentRatio = '11';
            posterCanvas.style.width = '450px';
            posterCanvas.style.height = '450px';
            this.className = "px-3 py-1 text-xs rounded font-medium bg-blue-600 text-white flex items-center space-x-1 transition";
            document.getElementById('ratio-916').className = "px-3 py-1 text-xs rounded font-medium text-gray-400 hover:text-white flex items-center space-x-1 transition";
        });

        // --- Live Typography Sync ---
        textMain.addEventListener('input', (e) => renderMain.innerText = e.target.value);
        textSub.addEventListener('input', (e) => renderSub.innerText = e.target.value);
        textSize.addEventListener('input', (e) => renderMain.style.fontSize = `${e.target.value}px`);
        textColor.addEventListener('input', (e) => {
            renderMain.style.color = e.target.value;
            textColorHex.innerText = e.target.value;
        });

        // --- Image Upload Processing ---
        uploadImg.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    displayImg.src = event.target.result;
                    displayImg.classList.remove('hidden');
                    imgPlaceholder.classList.add('hidden');
                    // Reset Transforms
                    imgState.x = 0; imgState.y = 0; imgState.scale = 1; imgState.rotate = 0;
                    layerScale.value = 1; layerRotate.value = 0;
                    updateTransform();
                }
                reader.readAsDataURL(file);
            }
        });

        // --- Multi-touch/Mouse Drag Logic ---
        layerImgContainer.addEventListener('mousedown', (e) => {
            if(displayImg.classList.contains('hidden')) return;
            imgState.isDragging = true;
            imgState.startX = e.clientX - imgState.x;
            imgState.startY = e.clientY - imgState.y;
            layerImgContainer.classList.add('layer-active');
        });

        window.addEventListener('mousemove', (e) => {
            if (!imgState.isDragging) return;
            imgState.x = e.clientX - imgState.startX;
            imgState.y = e.clientY - imgState.startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            imgState.isDragging = false;
            layerImgContainer.classList.remove('layer-active');
        });

        // --- Transformation Slider Listeners ---
        layerScale.addEventListener('input', (e) => {
            imgState.scale = parseFloat(e.target.value);
            valScale.innerText = imgState.scale.toFixed(2) + 'x';
            updateTransform();
        });

        layerRotate.addEventListener('input', (e) => {
            imgState.rotate = parseInt(e.target.value);
            valRotate.innerText = imgState.rotate + '°';
            updateTransform();
        });

        function updateTransform() {
            layerImgContainer.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale}) rotate(${imgState.rotate}deg)`;
        }

        // --- Canvas HD Export System ---
        document.getElementById('btn-export').addEventListener('click', function() {
            const canvas = document.getElementById('hidden-export-canvas');
            const ctx = canvas.getContext('2d');
            
            // Set High-res Scale factor (3x output for crisp text/images)
            const scaleFactor = 3;
            const origWidth = currentRatio === '916' ? 360 : 450;
            const origHeight = currentRatio === '916' ? 640 : 450;
            
            canvas.width = origWidth * scaleFactor;
            canvas.height = origHeight * scaleFactor;
            ctx.scale(scaleFactor, scaleFactor);

            // 1. Draw Background Gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, origHeight);
            gradient.addColorStop(0, '#1E2530');
            gradient.addColorStop(1, '#0A0D14');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, origWidth, origHeight);

            // 2. Draw Transformed Car Image Layer (If loaded)
            if (!displayImg.classList.contains('hidden')) {
                ctx.save();
                // Move origin to current drag layout coordinates
                ctx.translate(origWidth / 2 + imgState.x, origHeight / 2 + imgState.y);
                ctx.scale(imgState.scale, imgState.scale);
                ctx.rotate((imgState.rotate * Math.PI) / 180);

                // Compute rendering layout bounding box
                const iw = displayImg.naturalWidth;
                const ih = displayImg.naturalHeight;
                const aspect = iw / ih;
                
                let renderW = origWidth;
                let renderH = origWidth / aspect;
                if (renderH > origHeight) {
                    renderH = origHeight;
                    renderW = origHeight * aspect;
                }

                ctx.drawImage(displayImg, -renderW / 2, -renderH / 2, renderW, renderH);
                ctx.restore();
            }

            // 3. Draw Bottom Contrast Shading
            const textGuardGlow = ctx.createLinearGradient(0, origHeight - 200, 0, origHeight);
            textGuardGlow.addColorStop(0, 'rgba(0,0,0,0)');
            textGuardGlow.addColorStop(0.5, 'rgba(0,0,0,0.4)');
            textGuardGlow.addColorStop(1, 'rgba(0,0,0,0.85)');
            ctx.fillStyle = textGuardGlow;
            ctx.fillRect(0, origHeight - 200, origWidth, 200);

            // 4. Render Brand Sub-tag Box
            ctx.save();
            ctx.fillStyle = '#2563EB'; // Blue-600
            const tagX = 32;
            const tagY = origHeight - 140;
            
            ctx.font = 'bold 10px "Inter"';
            const tagText = textSub.value.toUpperCase();
            const tagWidth = ctx.measureText(tagText).width + 16;
            
            // Round rect draw
            ctx.beginPath();
            ctx.roundRect(tagX, tagY, tagWidth, 20, 4);
            ctx.fill();
            
            // Tag Content
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(tagText, tagX + 8, tagY + 14);
            ctx.restore();

            // 5. Render Main Pure Japanese Copy wrapped nicely
            ctx.save();
            ctx.fillStyle = textColor.value;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            const fontSize = parseInt(textSize.value);
            ctx.font = `bold ${fontSize}px "Noto Sans JP", "Inter"`;
            
            const textX = 32;
            let textY = origHeight - 95;
            const maxWidth = origWidth - 64;
            
            // Text Wrapping Engine
            const words = textMain.value.split('');
            let line = '';
            const lineHeight = fontSize * 1.35;

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n];
                let metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    ctx.fillText(line, textX, textY);
                    line = words[n];
                    textY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, textX, textY);
            ctx.restore();

            // 6. Push download stream
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `mz_auto_${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
