<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        .live-edit-input { border: 1px dashed #0F172A !important; padding: 4px; width: 100%; border-radius: 4px; }
    </style>
</head>
<body class="p-4 bg-[#F8FAFC]">
    <div class="max-w-xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <div class="flex justify-between items-center text-xs text-slate-400 font-bold uppercase tracking-widest">
                <span>02 / MEMORY COCKPIT</span>
                <button onclick="deleteCurrentCard()" class="text-slate-400 hover:text-red-500">🗑删除此条</button>
            </div>
            <div class="flex justify-between items-start">
                <div>
                    <span id="cardLevel" class="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-mono text-[#0F172A]">N3</span>
                    <h1 id="cardWord" class="text-3xl font-black pt-2">加载中...</h1>
                </div>
                <button onclick="speakJapanese()" class="p-2 border rounded-lg text-xs font-bold">🔊 朗读原音</button>
            </div>
            
            <div class="bg-slate-50 p-4 rounded-xl space-y-3 text-sm">
                <div>汉字标记：<span id="cardFurigana" class="font-bold"></span></div>
                <div>中文翻译：<span id="cardTranslation" class="font-bold text-[#0F172A]"></span></div>
                <div>功能解释：<span id="cardMeaning" class="text-slate-600"></span></div>
                <div>接续规则：<div id="cardConnection" class="text-xs bg-white p-2 mt-1 border rounded"></div></div>
                <div>听抄例句：<div id="cardMemo" class="text-xs bg-white p-2 mt-1 border rounded"></div></div>
            </div>

            <div id="decisionBox" class="grid grid-cols-2 gap-4">
                <button onclick="handleDecision(false)" class="py-3 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold">❌ 没想起来 (重置)</button>
                <button onclick="handleDecision(true)" class="py-3 bg-[#0F172A] text-white rounded-lg text-xs font-bold">✅ 顺利通过 (晋级)</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-3">
            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">01 / SMART INPUT FLOW</span>
            <textarea id="vSmartPaste" rows="3" oninput="handleSmartSplit()" class="w-full p-3 border rounded-lg text-xs" placeholder="在此粘贴听抄文字..."></textarea>
            <button onclick="saveNewVocab()" class="w-full py-3 bg-[#0F172A] text-white rounded-lg text-xs font-bold">📤 安全存入并同步</button>
        </div>
    </div>

    <script>
        let localDB = JSON.parse(localStorage.getItem('MZ_JAP_GRAMMAR_DB') || '[]');
        let currentIndex = 0;

        window.onload = () => { refresh(); fetchFromCloud(); };

        function refresh() {
            if(localDB.length === 0) { document.getElementById('cardWord').innerText = "暂无数据"; return; }
            const card = localDB[currentIndex];
            document.getElementById('cardLevel').innerText = card.level;
            document.getElementById('cardWord').innerText = card.word;
            document.getElementById('cardFurigana').innerText = card.furigana;
            document.getElementById('cardTranslation').innerText = card.translation;
            document.getElementById('cardMeaning').innerText = card.meaning;
            document.getElementById('cardConnection').innerText = card.connection;
            document.getElementById('cardMemo').innerText = card.memo;
        }

        function handleDecision(yes) {
            // 逻辑处理后自动同步
            currentIndex = (currentIndex + 1) % localDB.length;
            refresh();
            pushToCloud();
        }

        function deleteCurrentCard() {
            if(!confirm("确定删除吗？")) return;
            localDB.splice(currentIndex, 1);
            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localDB));
            currentIndex = 0;
            refresh();
            pushToCloud();
        }

        function saveNewVocab() {
            const card = {
                id: 'v_'+Date.now(),
                word: document.getElementById('vWord')?.value || "新词",
                level: document.getElementById('vLevel')?.value || "N3",
                furigana: document.getElementById('vFurigana')?.value || "",
                translation: document.getElementById('vTranslation')?.value || "",
                meaning: document.getElementById('vMeaning')?.value || "",
                connection: document.getElementById('vConnection')?.value || "",
                memo: document.getElementById('vMemo')?.value || ""
            };
            localDB.unshift(card);
            localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localDB));
            refresh();
            pushToCloud();
        }

        // 同步逻辑 (保持连接)
        function fetchFromCloud() {
            // 这里放你那套确认好用的 XHR 同步代码
        }
        function pushToCloud() {
            // 这里放你那套确认好用的 XHR 同步代码
        }
        function speakJapanese() {
            const u = new SpeechSynthesisUtterance(localDB[currentIndex].word);
            u.lang = 'ja-JP'; window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
