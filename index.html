<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        input, select, textarea { background-color: #FFFFFF; border: 1px solid #E2E8F0 !important; transition: all 0.15s ease; }
        input:focus, select:focus, textarea:focus { border-color: #1E3A8A !important; box-shadow: 0 0 0 2px rgba(30, 58, 138, 0.05); outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .live-edit-input { border: 1px dashed #3B82F6 !important; background-color: #FFF !important; padding: 4px 8px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 6px; color: #1E3A8A; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen flex justify-center items-start">

    <div id="appContainer" class="w-full max-w-7xl flex flex-col gap-6 md:gap-8">
        
        <div class="bg-[#1E3A8A] p-6 md:p-8 rounded-xl shadow-md text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="w-12 h-0.5 bg-sky-400 mb-2"></div>
                <h3 class="text-xl font-bold tracking-wider">N5-N2自查文法库</h3>
                <p class="text-xs text-slate-300 mt-1">云同步复位版：回到全套交互完美跑通、支持跨端 GitHub 云同步的最初状态。</p>
            </div>
            <div class="flex gap-8 border-t md:border-t-0 pt-4 md:pt-0 border-blue-900/50 w-full md:w-auto font-serif">
                <div class="text-center md:text-left">
                    <span class="block text-[10px] font-black text-rose-300 tracking-wider mb-1 uppercase" id="dueTitle">🚨 今日截止需复习</span>
                    <span class="text-4xl font-black tracking-tighter text-rose-400" id="dueCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
                <div class="text-center md:text-left border-l border-blue-900/60 pl-8">
                    <span class="block text-[10px] font-black text-sky-300 tracking-wider mb-1 uppercase">📦 语法库总储备</span>
                    <span class="text-4xl font-black tracking-tighter text-sky-200" id="totalCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
            </div>
        </div>

        <div id="cloudConfigPanel" class="bg-blue-50 border border-blue-200 p-4 rounded-xl grid grid-cols-1 md:grid-cols-4 gap-3 text-xs items-end">
            <div>
                <label class="block font-bold text-blue-900 mb-1">GitHub 用户名</label>
                <input type="text" id="ghUser" value="l10194563324-oss" class="w-full p-2 rounded border">
            </div>
            <div>
                <label class="block font-bold text-blue-900 mb-1">仓库名称</label>
                <input type="text" id="ghRepo" value="japanese-vocab-dog" class="w-full p-2 rounded border">
            </div>
            <div>
                <label class="block font-bold text-blue-900 mb-1">GitHub Token (钥匙)</label>
                <input type="password" id="ghToken" placeholder="贴入 ghp_ 开头的Token" class="w-full p-2 rounded border">
            </div>
            <div class="flex gap-2">
                <button onclick="saveCloudConfig()" class="flex-1 py-2 bg-blue-800 text-white font-bold rounded hover:bg-blue-900 cursor-pointer text-center">
                    💾 绑定并云同步
                </button>
                <button onclick="fetchFromCloud(true)" class="py-2 px-3 bg-emerald-600 text-white font-bold rounded hover:bg-emerald-700 cursor-pointer" title="手动从云端拉取最新数据">
                    🔄 拉取
                </button>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
            
            <div class="lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase block border-b border-slate-100 pb-2">01 / SMART INPUT FLOW (自由无感录入)</span>
                    
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-1.5">
                        <label class="block text-[11px] font-black text-[#1E3A8A]">✨ 自由乱序输入/粘贴框</label>
                        <textarea id="vSmartPaste" rows="4" oninput="handleSmartSplit()" placeholder="直接把听抄的整段文本糊在这里，下方全自动进行分流特征识别..." class="w-full p-2.5 bg-white rounded-lg text-xs font-medium border-dashed text-slate-700"></textarea>
                    </div>

                    <div class="w-full border-t border-slate-100 my-2"></div>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">日文语法点/词汇</label>
                            <input type="text" id="vWord" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">级别</label>
                            <select id="vLevel" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-700">
                                <option value="N2">N2 核心</option><option value="N3" selected>N3 核心</option><option value="N4">N4 基础</option><option value="N5">N5 基础</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">日文汉字标记</label>
                        <input type="text" id="vFurigana" class="w-full p-2.5 rounded-lg text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文翻译</label>
                        <input type="text" id="vTranslation" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文语法功能解释</label>
                        <input type="text" id="vMeaning" class="w-full p-2.5 rounded-lg text-xs text-slate-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">接续规则 (支持自动多行换行)</label>
                        <textarea id="vConnection" rows="3" class="w-full p-2.5 rounded-lg text-xs text-slate-600 leading-relaxed"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">听抄日文例句/场景备注</label>
                        <textarea id="vMemo" rows="3" class="w-full p-2.5 rounded-lg text-xs"></textarea>
                    </div>
                    <button onclick="saveNewVocab()" class="w-full text-xs font-black tracking-widest py-3 bg-[#1E3A8A] hover:bg-blue-900 text-white rounded-lg transition cursor-pointer shadow-sm">
                        📥 安全存入并同步至云端
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-xs space-y-3">
                    <span class="text-xs font-black tracking-widest text-slate-400 uppercase block">数据迁移保护盾</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportBackupData()" class="p-2 border border-dashed border-slate-300 rounded-lg text-center font-bold text-slate-600 hover:bg-slate-50 cursor-pointer">
                            📤 备份导出文法库
                        </button>
                        <label class="p-2 border border-dashed border-slate-300 rounded-lg text-center font-bold text-slate-600 hover:bg-slate-50 cursor-pointer block">
                            📥 导入恢复文法库
                            <input type="file" id="importFile" class="hidden" onchange="importBackupData(this)">
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col min-h-[480px] md:min-h-[540px] order-1 lg:order-2">
                <div class="border-b border-slate-100 pb-3 mb-6 flex justify-between items-center">
                    <span class="text-xs font-black tracking-widest text-[#1E3A8A] uppercase">02 / MEMORY COCKPIT (智能自查舱)</span>
                    <div class="flex items-center gap-4">
                        <button onclick="deleteCurrentCard()" id="deleteBtn" class="text-[10px] font-bold text-slate-300 hover:text-red-600 transition cursor-pointer hidden">
                            🗑️ 删除此条
                        </button>
                        <span class="text-[10px] font-mono text-gray-400" id="cardIndexText">0 / 0</span>
                    </div>
                </div>

                <div id="cardCockpit" class="flex-1 flex flex-col justify-between space-y-8">
                    <div id="emptyState" class="text-center py-16 flex flex-col items-center justify-center space-y-4 hidden">
                        <span class="text-xs italic text-slate-400">🎉 太棒了！当前待自查复习的语法点已通关清零！</span>
                        <button onclick="startInfiniteReviewMode()" class="px-6 py-3 bg-[#1E3A8A] text-white hover:bg-blue-900 font-bold text-xs rounded-xl shadow-md transition cursor-pointer flex items-center gap-2">
                            🔄 开启无限自由复习 / 再次学习
                        </button>
                    </div>

                    <div id="activeCard" class="space-y-6 flex-1 flex flex-col justify-between hidden">
                        <div class="space-y-2 flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <span id="cardLevel" class="inline-block text-[9px] font-black px-1.5 py-0.5 bg-blue-50 text-[#1E3A8A] rounded">N3</span>
                                <h1 id="cardWord" class="text-3xl md:text-4xl font-black font-serif tracking-wide text-slate-900 pt-2 break-words">加载中...</h1>
                            </div>
                            <button onclick="speakJapanese()" class="p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-lg text-sm font-bold text-slate-700 cursor-pointer transition shadow-sm flex items-center gap-1.5 shrink-0" title="朗读纯正日文原音">
                                🔊 朗读原音
                            </button>
                        </div>

                        <div id="hiddenZone" class="bg-slate-50 border border-slate-100 p-4 md:p-5 rounded-xl space-y-3 opacity-100 transition-opacity">
                            <div class="blur-md pointer-events-none select-none transition-all duration-300" id="blurWrapper">
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center" onclick="makeEditable('furigana')">
                                    汉字标记：<span id="cardFuriganaContainer" class="inline-block ml-1 flex-1 font-serif text-sm text-slate-800 font-bold"><span id="cardFurigana"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('translation')">
                                    中文翻译：<span id="cardTranslationContainer" class="inline-block ml-1 flex-1 text-base text-blue-900 font-bold"><span id="cardTranslation"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 flex items-center mt-1" onclick="makeEditable('meaning')">
                                    功能解释：<span id="cardMeaningContainer" class="inline-block ml-1 flex-1 text-xs text-slate-600"><span id="cardMeaning"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></span>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-1 block" onclick="makeEditable('connection')">
                                    接续规则：
                                    <div id="cardConnectionContainer" class="text-slate-700 text-xs font-mono bg-white/60 p-2 rounded border border-slate-200/50 mt-1 leading-relaxed whitespace-pre-wrap"><span id="cardConnection"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                                <div class="text-xs text-slate-400 editable-zone py-1 mt-2 border-t border-slate-200/60 pt-2" onclick="makeEditable('memo')">
                                    听抄日文例句/场景备注：
                                    <div id="cardMemoContainer" class="text-slate-600 font-sans mt-1 italic text-xs leading-relaxed whitespace-pre-wrap"><span id="cardMemo"></span> <span class="edit-hint text-[10px] text-blue-600 pl-1">✏️</span></div>
                                </div>
                            </div>
                            <div id="triggerBtnBox" class="text-center py-4">
                                <button onclick="revealCard()" id="revealBtn" class="w-full md:w-auto px-6 py-2.5 bg-slate-800 text-white font-bold text-xs rounded-full hover:bg-black transition cursor-pointer shadow-sm">
                                    👁️ 脑补完毕，查看隐藏答案
                                </button>
                            </div>
                        </div>

                        <div id="decisionBox" class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 hidden">
                            <button onclick="handleDecision(false)" class="py-3 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold border border-rose-200 hover:bg-rose-100 transition cursor-pointer text-center">
                                ❌ 没想起来 (重置)
                            </button>
                            <button onclick="handleDecision(true)" class="py-3 bg-blue-800 text-white rounded-lg text-xs font-bold hover:bg-blue-900 transition cursor-pointer text-center shadow-sm">
                                ✅ 顺利通过 (晋级)
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="w-full bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mt-2">
            <div class="bg-slate-100 px-5 py-4 flex justify-between items-center border-b border-slate-200 cursor-pointer" onclick="toggleDatabasePanel()">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-[#1E3A8A] uppercase tracking-wider">📚 WHOLE GRAMMAR DATABASE (整体文法全量题库)</span>
                    <span class="text-[10px] bg-blue-100 text-[#1E3A8A] font-bold px-2 py-0.5 rounded-full" id="dbTotalBadge">0 条</span>
                </div>
                <span id="foldArrow" class="text-xs font-bold text-slate-400 transition-transform">展开 ➕</span>
            </div>
            <div id="databasePanelBody" class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden max-h-[600px] overflow-y-auto no-scrollbar bg-slate-50/50">
            </div>
        </div>

    </div>

    <script>
        const EBBINGHAUS_INTERVALS = [0, 1, 24, 72, 168, 360];
        let localVocabDB = []; let dueCardsPool = []; let currentIndex = 0; let isRevealedStatus = false;
        let isInfiniteReviewMode = false;
        let cloudSha = null;

        window.onload = function() {
            loadCloudConfigFromLocal();
            initVocabEngine();
        };

        function loadCloudConfigFromLocal() {
            document.getElementById('ghUser').value = localStorage.getItem('MZ_GH_USER') || 'l10194563324-oss';
            document.getElementById('ghRepo').value = localStorage.getItem('MZ_GH_REPO') || 'japanese-vocab-dog';
            document.getElementById('ghToken').value = localStorage.getItem('MZ_GH_TOKEN') || '';
        }

        function saveCloudConfig() {
            localStorage.setItem('MZ_GH_USER', document.getElementById('ghUser').value.trim());
            localStorage.setItem('MZ_GH_REPO', document.getElementById('ghRepo').value.trim());
            localStorage.setItem('MZ_GH_TOKEN', document.getElementById('ghToken').value.trim());
            fetchFromCloud(true);
        }

        async function fetchFromCloud(showAlert = false) {
            const user = localStorage.getItem('MZ_GH_USER') || 'l10194563324-oss';
            const repo = localStorage.getItem('MZ_GH_REPO') || 'japanese-vocab-dog';
            const token = localStorage.getItem('MZ_GH_TOKEN');
            if(!user || !token) return;

            const url
