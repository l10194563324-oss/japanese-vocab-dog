<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        input, select, textarea { background-color: #FFFFFF; border: 1px solid #E2E8F0 !important; transition: all 0.15s ease; border-radius: 6px; }
        input:focus, select:focus, textarea:focus { border-color: #0F172A !important; box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.05); outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ✏️ 原地快捷修改大文本编辑舱样式 */
        .live-edit-input { border: 1px dashed #3B82F6 !important; background-color: #FFF !important; padding: 6px 10px; font-size: inherit; font-family: inherit; width: 100%; border-radius: 6px; color: #0F172A; line-height: 1.6; }
        .edit-hint { opacity: 0; transition: opacity 0.2s ease; cursor: pointer; }
        .editable-zone:hover .edit-hint { opacity: 0.6; }
    </style>
</head>
<body class="p-3 md:p-8 min-h-screen flex justify-center items-start bg-[#F8FAFC]">

    <div id="appContainer" class="w-full max-w-7xl flex flex-col gap-6 md:gap-8">
        
        <div class="bg-[#0F172A] p-6 md:p-8 rounded-xl shadow-sm text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <div class="w-12 h-0.5 bg-amber-400 mb-2"></div>
                <h3 class="text-xl font-bold font-serif tracking-wider">N5-N2自查文法库</h3>
                <p class="text-xs text-slate-300 mt-1 font-sans">日系轻杂志风：已部署无源冷启动断路器与工业级字符安全编码矩阵，终结由于初始化引起的全部卡死异常。</p>
            </div>
            <div class="flex gap-8 border-t md:border-t-0 pt-4 md:pt-0 border-slate-800 w-full md:w-auto font-serif">
                <div class="text-center md:text-left">
                    <span class="block text-[10px] font-black text-rose-300 tracking-wider mb-1 uppercase" id="dueTitle">🚨 今日截止需复习</span>
                    <span class="text-4xl font-black tracking-tighter text-rose-400" id="dueCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
                <div class="text-center md:text-left border-l border-slate-800 pl-8">
                    <span class="block text-[10px] font-black text-sky-300 tracking-wider mb-1 uppercase">📦 语法库总储备</span>
                    <span class="text-4xl font-black tracking-tighter text-sky-200" id="totalCount">0</span><span class="text-xs font-bold ml-1 text-slate-300">条</span>
                </div>
            </div>
        </div>

        <div id="cloudConfigPanel" class="bg-slate-100/80 border border-slate-200 p-4 rounded-xl grid grid-cols-1 md:grid-cols-4 gap-3 text-xs items-end">
            <div>
                <label class="block font-bold text-slate-700 mb-1">GitHub 用户名</label>
                <input type="text" id="ghUser" value="l10194563324-oss" class="w-full p-2 border">
            </div>
            <div>
                <label class="block font-bold text-slate-700 mb-1">仓库名称</label>
                <input type="text" id="ghRepo" value="japanese-vocab-dog" class="w-full p-2 border">
            </div>
            <div>
                <label class="block font-bold text-slate-700 mb-1">GitHub Token (钥匙)</label>
                <input type="password" id="ghToken" placeholder="贴入 ghp_ 开头的Token" class="w-full p-2 border">
            </div>
            <div class="flex gap-2">
                <button onclick="saveCloudConfig()" class="flex-1 py-2 bg-[#0F172A] text-white font-bold rounded-lg hover:bg-slate-800 transition cursor-pointer">
                    💾 绑定并云同步
                </button>
                <button onclick="fetchFromCloud(true)" class="py-2 px-3 bg-slate-600 text-white font-bold rounded-lg hover:bg-slate-700 cursor-pointer" title="从云端拉取最新数据">
                    🔄 拉取
                </button>
            </div>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 items-start">
            
            <div class="lg:col-span-5 flex flex-col gap-6 order-2 lg:order-1">
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200/60 shadow-xs space-y-4">
                    <span class="text-xs font-black tracking-widest text-[#0F172A] uppercase block border-b border-slate-100 pb-2 font-serif">01 / SMART INPUT FLOW (自由无感录入)</span>
                    
                    <div class="bg-slate-50/80 p-3 rounded-lg border border-slate-200 space-y-1.5">
                        <label class="block text-[11px] font-black text-[#0F172A]">✨ 自由乱序输入/粘贴框</label>
                        <textarea id="vSmartPaste" rows="4" oninput="handleSmartSplit()" placeholder="管它格式和符号，直接把中日文、接续、听抄例句一屁股糊在这里..." class="w-full p-2.5 bg-white rounded-lg text-xs font-medium border-dashed text-slate-700 leading-relaxed"></textarea>
                    </div>

                    <div class="w-full border-t border-slate-100 my-2"></div>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">日文语法点/词汇</label>
                            <input type="text" id="vWord" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1">级别</label>
                            <select id="vLevel" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-700">
                                <option value="N2">N2 核心</option><option value="N3" selected>N3 核心</option><option value="N4">N4 基础</option><option value="N5">N5 基础</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">日文汉字标记</label>
                        <input type="text" id="vFurigana" class="w-full p-2.5 rounded-lg text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文翻译</label>
                        <input type="text" id="vTranslation" class="w-full p-2.5 rounded-lg text-xs font-bold text-slate-800">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">中文语法功能解释</label>
                        <input type="text" id="vMeaning" class="w-full p-2.5 rounded-lg text-xs text-slate-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">接续规则 (支持自动多行换行)</label>
                        <textarea id="vConnection" rows="3" class="w-full p-2.5 rounded-lg text-xs text-slate-600
