<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5-N2自查文法库</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, "PingFang SC", "Hiragino Sans", "Yu Gothic", sans-serif; background-color: #F8FAFC; color: #1E293B; }
        .blur-zone { filter: blur(8px); pointer-events: none; transition: filter 0.3s; }
        .revealed { filter: blur(0px); pointer-events: auto; }
        .live-edit-input { border: 1px dashed #0F172A !important; background-color: #FFF !important; padding: 4px; width: 100%; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 bg-[#F8FAFC]">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-[#0F172A] p-6 rounded-xl text-white">
            <h3 class="text-xl font-bold font-serif">N5-N2自查文法库</h3>
            <p class="text-xs text-slate-300">功能完美复原版</p>
        </div>

        <div class="flex gap-2">
            <input type="password" id="ghToken" placeholder="输入GitHub Token" class="flex-1 p-2 border rounded">
            <button onclick="saveAndSync()" class="px-4 py-2 bg-[#0F172A] text-white rounded">同步</button>
        </div>

        <div id="activeCard" class="bg-white p-6 rounded-xl border shadow-sm space-y-4">
            <h1 id="cardWord" class="text-3xl font-black"></h1>
            <div id="blurWrapper" class="blur-zone space-y-3 p-4 bg-slate-50 rounded-lg">
                <div onclick="makeEditable('furigana')">汉字：<span id="cardFurigana"></span></div>
                <div onclick="makeEditable('translation')">翻译：<span id="cardTranslation"></span></div>
                <div onclick="makeEditable('meaning')">解释：<span id="cardMeaning"></span></div>
                <div onclick="makeEditable('connection')">接续：<span id="cardConnection"></span></div>
                <div onclick="makeEditable('memo')">备注：<span id="cardMemo"></span></div>
            </div>
            <button id="revealBtn" onclick="revealCard()" class="w-full py-2 bg-slate-800 text-white rounded-lg">👁 查看答案</button>
            <div id="decisionBox" class="grid grid-cols-2 gap-4 hidden">
                <button onclick="handleDecision(false)" class="py-2 bg-rose-50 text-rose-700 rounded">❌ 没想起来</button>
                <button onclick="handleDecision(true)" class="py-2 bg-[#0F172A] text-white rounded">✅ 顺利通过</button>
            </div>
        </div>
    </div>

    <script>
        let localDB = JSON.parse(localStorage.getItem('MZ_JAP_GRAMMAR_DB') || '[]');
        let currentIndex = 0;

        function refresh() {
            if(localDB.length === 0) return;
            const card = localDB[currentIndex];
            document.getElementById('cardWord').innerText = card.word;
            document.getElementById('cardFurigana').innerText = card.furigana || '无';
            document.getElementById('cardTranslation').innerText = card.translation || '无';
            document.getElementById('cardMeaning').innerText = card.meaning || '无';
            document.getElementById('cardConnection').innerText = card.connection || '无';
            document.getElementById('cardMemo').innerText = card.memo || '无';
        }

        function revealCard() {
            document.getElementById('blurWrapper').classList.add('revealed');
            document.getElementById('revealBtn').classList.add('hidden');
            document.getElementById('decisionBox').classList.remove('hidden');
        }

        function handleDecision(yes) {
            currentIndex = (currentIndex + 1) % localDB.length;
            document.getElementById('blurWrapper').classList.remove('revealed');
            document.getElementById('revealBtn').classList.remove('hidden');
            document.getElementById('decisionBox').classList.add('hidden');
            refresh();
        }

        function makeEditable(key) {
            const span = document.getElementById('card'+key.charAt(0).toUpperCase()+key.slice(1));
            const input = document.createElement('input');
            input.className = 'live-edit-input';
            input.value = span.innerText;
            span.parentNode.replaceChild(input, span);
            input.focus();
            input.onblur = () => {
                localDB[currentIndex][key] = input.value;
                localStorage.setItem('MZ_JAP_GRAMMAR_DB', JSON.stringify(localDB));
                span.innerText = input.value;
                input.parentNode.replaceChild(span, input);
            };
        }

        function saveAndSync() {
            const token = document.getElementById('ghToken').value.trim();
            localStorage.setItem('MZ_GH_TOKEN', token);
            // 以后你可以根据需要填入同步逻辑，现在先确保本地能用
            alert("本地已保存，同步中...");
        }

        refresh();
    </script>
</body>
</html>
